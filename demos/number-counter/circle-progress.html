<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07. 원형 프로그레스 — Number Counter Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.15); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 999px; animation: hint-bounce 1.6s ease-in-out infinite; }
    @keyframes hint-bounce { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(4px); opacity: 1; } }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .scroll-track { min-height: 240vh; position: relative; }
    .sticky-stage { position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .circle-wrap { position: relative; width: clamp(200px,28vw,320px); height: clamp(200px,28vw,320px); }
    .circle-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .circle-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
    .circle-fg { fill: none; stroke: #3b82f6; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 553; stroke-dashoffset: 553; transition: stroke-dashoffset 0.05s linear; }
    .circle-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 2px; }
    .counter-value { font: 700 clamp(40px,6vw,72px)/1 "Pretendard Variable",sans-serif; color: #fff; font-variant-numeric: tabular-nums; }
    .counter-suffix { font: 500 clamp(18px,2.5vw,28px)/1 "Pretendard Variable",sans-serif; color: rgba(255,255,255,0.4); }
    .counter-label { font: 400 clamp(13px,1.1vw,17px)/1.4 "Pretendard Variable",sans-serif; color: rgba(255,255,255,0.3); margin-top: 20px; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">07 · 원형 프로그레스</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <div class="circle-wrap">
        <svg class="circle-svg" viewBox="0 0 200 200">
          <circle class="circle-bg" cx="100" cy="100" r="88" />
          <circle class="circle-fg" cx="100" cy="100" r="88" />
        </svg>
        <div class="circle-text"><span class="counter-value">0</span><span class="counter-suffix">%</span></div>
      </div>
      <p class="counter-label">달성률</p>
    </div>
  </div>

  <script>
    (function(){
      var progressFill = document.querySelector(".demo-progress > div");
      var track = document.querySelector(".scroll-track");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }
      var valEl = document.querySelector(".counter-value");
      var fg = document.querySelector(".circle-fg");
      var CIRC = 2 * Math.PI * 88; // 553.08
      function applyReveal(p) {
        var v = Math.round(p * 100);
        valEl.textContent = v;
        fg.style.strokeDashoffset = CIRC * (1 - p);
      }
      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
