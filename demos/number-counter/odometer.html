<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03. 자릿수 롤링 (오도미터) — Number Counter Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.15); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; }
    .showcase { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .odo-wrap { display: flex; align-items: flex-start; justify-content: center; }
    .odo-digit { height: 1em; overflow: hidden; font: 800 clamp(72px,11vw,150px)/1 "Pretendard Variable",sans-serif; color: #fff; }
    .odo-strip { transition: transform 0.1s ease-out; font-variant-numeric: tabular-nums; }
    .odo-comma { font: 800 clamp(72px,11vw,150px)/1 "Pretendard Variable",sans-serif; color: rgba(255,255,255,0.3); }
    .counter-label { font: 400 clamp(13px,1.1vw,17px)/1.4 "Pretendard Variable",sans-serif; color: rgba(255,255,255,0.3); margin-top: 20px; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">03 · 자릿수 롤링 (오도미터)</span>
  </div>
  <div class="demo-progress"><div></div></div>

  <main class="showcase">
    <div class="odo-wrap">
      <div class="odo-digit" data-pos="3"><div class="odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</div></div>
      <span class="odo-comma">,</span>
      <div class="odo-digit" data-pos="2"><div class="odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</div></div>
      <div class="odo-digit" data-pos="1"><div class="odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</div></div>
      <div class="odo-digit" data-pos="0"><div class="odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</div></div>
    </div>
    <p class="counter-label">프로젝트 완료</p>
  </main>

  <script>
    (function(){
      var progressFill = document.querySelector(".demo-progress > div");
      var DURATION = 2000;
      var startTime = null;
      var digits = document.querySelectorAll(".odo-digit");
      var TARGET = 8524;
      function applyReveal(p) {
        var val = Math.floor(p * TARGET);
        var str = String(val).padStart(4, "0");
        digits.forEach(function(d) {
          var pos = parseInt(d.dataset.pos);
          var digitVal = parseInt(str[3 - pos]);
          var strip = d.querySelector(".odo-strip");
          strip.style.transform = "translateY(-" + (digitVal * 100) + "%)";
        });
      }
      function tick(timestamp) {
        if (!startTime) startTime = timestamp;
        var elapsed = timestamp - startTime;
        var p = Math.min(1, elapsed / DURATION);
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      window.__reset = function(){
        startTime = null;
        applyReveal(0);
        requestAnimationFrame(tick);
      };
    })();
  </script>
</body>
</html>
