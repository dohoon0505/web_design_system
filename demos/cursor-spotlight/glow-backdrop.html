<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08. 무빙 글로우 배경 (Vercel) — Cursor Spotlight Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #050505; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; pointer-events: none; }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 11px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; pointer-events: none; animation: hint-pulse 2.4s ease-in-out infinite; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .stage {
      position: relative; width: 100%; height: 100vh; overflow: hidden;
      cursor: crosshair;
      --x: 50%; --y: 50%;
    }
    
    .glow-blob { position: absolute; left: 0; top: 0; border-radius: 50%; pointer-events: none; will-change: transform; }
    .blob-a { width: 460px; height: 460px; filter: blur(70px);
      background: radial-gradient(closest-side, rgba(124,108,255,0.55), rgba(124,108,255,0.18) 55%, transparent 75%);
    }
    .blob-b { width: 300px; height: 300px; filter: blur(50px);
      background: radial-gradient(closest-side, rgba(76,201,240,0.5), rgba(76,201,240,0.15) 55%, transparent 75%);
    }
    .hero { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 0 8vw; pointer-events: none; }
    .hero-title { margin: 0; font-size: clamp(30px, 6vw, 54px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.25; word-break: keep-all; }
    .hero-sub { margin: 14px 0 0; font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.5); max-width: 460px; word-break: keep-all; }
    .hero-cta { margin-top: 24px; display: inline-flex; background: #fff; color: #000; font-weight: 600; font-size: 13px; border-radius: 999px; padding: 12px 22px; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <span class="demo-label">08 · 무빙 글로우 배경 (Vercel)</span>
  </div>
  <div class="demo-hint">마우스를 움직여보세요 ✦</div>

  <div class="stage">
    <div class="glow-blob blob-a"></div>
    <div class="glow-blob blob-b"></div>
    <div class="hero">
      <h1 class="hero-title">빛은 한 박자 늦게<br>당신을 따라옵니다</h1>
      <p class="hero-sub">mousemove는 목표 좌표만 갱신하고, rAF 루프가 매 프레임 거리의 6%씩 다가갑니다.</p>
      <span class="hero-cta">지연 추적 체험 중</span>
    </div>
  </div>

  <script>
    (function(){
      var stage = document.querySelector(".stage");
      var blobA = document.querySelector(".blob-a");
      var blobB = document.querySelector(".blob-b");
      var tx = stage.clientWidth / 2, ty = stage.clientHeight / 2;
      var ax = tx, ay = ty, bx = tx, by = ty;
      stage.addEventListener("mousemove", function(e){
        var r = stage.getBoundingClientRect();
        tx = e.clientX - r.left;
        ty = e.clientY - r.top;
      });
      function frame(){
        ax += (tx - ax) * 0.06; ay += (ty - ay) * 0.06;
        bx += (tx - bx) * 0.12; by += (ty - by) * 0.12;
        blobA.style.transform = "translate(" + (ax - 230) + "px," + (ay - 230) + "px)";
        blobB.style.transform = "translate(" + (bx - 150) + "px," + (by - 150) + "px)";
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
