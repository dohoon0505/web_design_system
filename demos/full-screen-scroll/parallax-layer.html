<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05. 패럴랙스 레이어 — Full-screen Scroll Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable", "Pretendard", system-ui; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 ui-monospace, monospace; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.14); }
    .demo-label { font: 500 10px/1 ui-monospace, monospace; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 ui-monospace, monospace; color: rgba(255,255,255,0.45); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; animation: hint-bounce 1.6s ease-in-out infinite; }
    @keyframes hint-bounce { 0%, 100% { transform: translateY(0); opacity: 0.45; } 50% { transform: translateY(4px); opacity: 0.85; } }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .scroll-track { min-height: 200vh; position: relative; }
    .sticky-stage { position: sticky; top: 0; height: 100vh; overflow: hidden; }
    .fs-stack { position: absolute; inset: 0; overflow: hidden; background: #0f172a; }
    .fs-bg { position: absolute; inset: -20% 0 -20%; background: radial-gradient(ellipse at center top, #1e3a8a 0%, transparent 60%), linear-gradient(180deg, #0f172a 0%, #020617 100%); will-change: transform; }
    .fs-mid { position: absolute; inset: 30% 0 -30%; background: radial-gradient(ellipse at center, #7e22ce 0%, transparent 65%); opacity: 0.5; will-change: transform; mix-blend-mode: screen; }
    .fs-cap { text-align: center; color: #fff; max-width: 720px; padding: 0 8vw; }
    .fs-num { font: 600 12px/1 ui-monospace, monospace; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 20px; }
    .fs-title { font: 700 clamp(40px, 6vw, 84px)/1.1 "Pretendard Variable","Pretendard",system-ui; margin: 0 0 18px; letter-spacing: -0.02em; }
    .fs-desc { font: 400 clamp(16px, 1.4vw, 20px)/1.55 "Pretendard Variable","Pretendard",system-ui; margin: 0; opacity: 0.85; }
    .fs-cap { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; max-width: 720px; margin: 0 auto; padding: 0 8vw; will-change: transform; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">05 · 패럴랙스 레이어</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <div class="fs-stack">
              <div class="fs-bg"></div>
              <div class="fs-mid"></div>
              <div class="fs-cap">
                <div class="fs-num">PARALLAX · LAYER</div>
                <h2 class="fs-title">깊이 있는 풍경</h2>
                <p class="fs-desc">스크롤할 때 배경과 전경이 다른 속도로 움직이며, 정지된 이미지에 깊이감을 부여합니다.</p>
              </div>
            </div>
    </div>
  </div>

  <script>
    (function(){
      var track = document.querySelector(".scroll-track");
      var progressFill = document.querySelector(".demo-progress > div");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }
      var bg = document.querySelector(".fs-bg");
      var mid = document.querySelector(".fs-mid");
      var cap = document.querySelector(".fs-cap");
      function applyReveal(p){
        bg.style.transform = "translateY(" + (p * -12) + "vh) scale(" + (1 + p * 0.08) + ")";
        mid.style.transform = "translateY(" + (p * -28) + "vh) scale(" + (1 + p * 0.15) + ")";
        cap.style.transform = "translateY(" + (p * -8) + "vh)";
        cap.style.opacity = 1 - p * 0.4;
      }
      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
