<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>09. 내비 적응형 — Scroll Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      will-change: background-color;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 20;
    }
    .demo-reset {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      backdrop-filter: blur(6px);
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-reset:hover {
      color: #fff; background: rgba(0,0,0,0.55); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.14em; text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      z-index: 20;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      animation: demo-hint-bounce 1.6s ease-in-out infinite;
    }
    @keyframes demo-hint-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50%       { transform: translateY(4px); opacity: 0.8; }
    }
    .demo-progress {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(127,127,127,0.18);
      z-index: 20;
    }
    .demo-progress > div {
      height: 100%; background: #fff; width: 0;
      mix-blend-mode: difference;
      transition: width 60ms linear;
    }
    .scroll-track { min-height: 240vh; position: relative; }
    .sticky-stage {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 8vw 60px;
      overflow: hidden;
    }
    /* 패턴별 CSS */
    .strip { position: absolute; left: 0; right: 0; top: 0; height: 300%; will-change: transform; }
    .sec { height: 33.3334%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 0 8vw; }
    .sec-tag { font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.22em; opacity: 0.55; }
    .sec h2 { font: 800 44px/1.25 "Pretendard Variable","Pretendard",system-ui; letter-spacing: -0.02em; margin: 0; }
    .sec p { font: 400 16px/1.7 "Pretendard Variable","Pretendard",system-ui; opacity: 0.66; margin: 0; max-width: 520px; }
    .sec-1 { background: rgb(8,9,10); color: #fff; }
    .sec-2 { background: rgb(244,240,232); color: #16181d; }
    .sec-3 { background: rgb(14,22,52); color: #fff; }
    .mini-nav { position: absolute; top: 52px; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 10; color: #fff; }
    .nav-logo { font: 800 16px/1 "Pretendard Variable","Pretendard",system-ui; letter-spacing: 0.04em; }
    .nav-links { display: inline-flex; gap: 22px; }
    .nav-links a { font: 600 13px/1 "Pretendard Variable","Pretendard",system-ui; color: inherit; text-decoration: none; opacity: 0.85; }
    .nav-cta { font: 700 12px/1 "Pretendard Variable","Pretendard",system-ui; border: 1.5px solid currentColor; border-radius: 999px; padding: 9px 16px; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">09 · 내비 적응형</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <div class="strip">
        <section class="sec sec-1">
          <span class="sec-tag">SECTION 01</span>
          <h2>다크에서 시작합니다</h2>
          <p>지금 내비 글자는 흰색 — 아래 깔린 섹션의 휘도가 낮기 때문입니다.</p>
        </section>
        <section class="sec sec-2">
          <span class="sec-tag">SECTION 02</span>
          <h2>크림 구간을 지나는 중</h2>
          <p>경계가 내비에 닿는 순간 로고·링크·버튼이 검정으로 반전됩니다.</p>
        </section>
        <section class="sec sec-3">
          <span class="sec-tag">SECTION 03</span>
          <h2>다시 딥블루로</h2>
          <p>내비는 섹션 색을 따라 두 번째 반전을 마칩니다.</p>
        </section>
      </div>
      <nav class="mini-nav">
        <span class="nav-logo">LAB®</span>
        <span class="nav-links"><a href="#" onclick="return false;">제품</a><a href="#" onclick="return false;">가격</a><a href="#" onclick="return false;">문서</a></span>
        <span class="nav-cta">시작하기</span>
      </nav>
    </div>
  </div>

  <script>
    (function(){
      var track = document.querySelector(".scroll-track");
      var progressFill = document.querySelector(".demo-progress > div");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }

      // 공용 색 보간 헬퍼
      function clamp01(v){ return Math.max(0, Math.min(1, v)); }
      function lerp(a, b, t){ return a + (b - a) * t; }
      function mixArr(a, b, t){
        return [Math.round(lerp(a[0], b[0], t)), Math.round(lerp(a[1], b[1], t)), Math.round(lerp(a[2], b[2], t))];
      }
      function lerpRGB(a, b, t){
        var c = mixArr(a, b, t);
        return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
      }
      function pick3Arr(stops, p){
        var seg = p < 0.5 ? 0 : 1;
        var t = clamp01(seg === 0 ? p / 0.5 : (p - 0.5) / 0.5);
        return mixArr(stops[seg], stops[seg + 1], t);
      }
      function pick3(stops, p){
        var c = pick3Arr(stops, p);
        return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
      }

      // 패턴별 init + applyReveal 정의
      var stripEl = document.querySelector(".strip");
      var navEl = document.querySelector(".mini-nav");
      var NAVC = [[255,255,255],[17,17,17],[255,255,255]];
      function applyReveal(p){
        stripEl.style.transform = "translateY(" + (-p * 66.6667) + "%)";
        var navY = p * 200 + 8;
        var idx = Math.min(2, Math.floor(navY / 100));
        var frac = navY - idx * 100;
        var blend = idx < 2 ? clamp01((frac - 92) / 8) : 0;
        navEl.style.color = lerpRGB(NAVC[idx], NAVC[Math.min(2, idx + 1)], blend);
      }

      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
