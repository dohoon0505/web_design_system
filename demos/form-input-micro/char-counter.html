<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08. 글자수 카운터 — Form Input Micro Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: background 0.2s ease, color 0.2s ease; }
    .demo-reset:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 11px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; animation: hint-pulse 2.4s ease-in-out infinite; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .stage {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 64px 20px 48px;
    }
    .form-card {
      width: 100%; max-width: 380px;
      background: #0d0d0d; border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px; padding: 32px 28px 28px;
      box-shadow: 0 24px 60px -30px rgba(0,0,0,0.85);
    }
    .form-title { margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .form-desc { margin: 0 0 24px; font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.45); }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field-label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: rgba(255,255,255,0.55); }
    .text-input {
      width: 100%; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
      padding: 13px 14px; font: 500 15px/1.4 "Pretendard Variable","Pretendard",sans-serif;
      color: #fff; outline: none; caret-color: #3b82f6;
      transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.28); }
    .text-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    
    .cc-wrap { position: relative; }
    .cc-area { width: 100%; resize: none; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.16); border-radius: 10px; padding: 13px 14px 36px; font: 500 14px/1.6 "Pretendard Variable","Pretendard",sans-serif; color: #fff; outline: none; caret-color: #3b82f6; transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out; }
    .cc-area::placeholder { color: rgba(255,255,255,0.28); }
    .cc-area:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    .cc-meta { position: absolute; right: 12px; bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .cc-meta[data-state="max"] { animation: cc-bump 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cc-bump { 0% { transform: scale(0.88); } 100% { transform: scale(1); } }
    .cc-gauge { width: 16px; height: 16px; transform: rotate(-90deg); }
    .cc-track { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 3; }
    .cc-fill { fill: none; stroke: rgba(255,255,255,0.45); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 50.27; stroke-dashoffset: 50.27; transition: stroke-dashoffset 0.18s ease-out, stroke 0.24s ease-out; }
    .cc-count { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.4); transition: color 0.24s ease-out; }
    .cc-meta[data-state="warn"] .cc-fill { stroke: #f59e0b; }
    .cc-meta[data-state="warn"] .cc-count { color: #fbbf24; }
    .cc-meta[data-state="max"] .cc-fill { stroke: #ef4444; }
    .cc-meta[data-state="max"] .cc-count { color: #f87171; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">08 · 글자수 카운터</span>
  </div>
  <div class="demo-hint">글을 길게 입력해 보세요</div>

  <main class="stage">
    <div class="form-card">
      <h2 class="form-title">자기소개 입력</h2>
      <p class="form-desc">한도(80자)에 가까워지면 카운터와 게이지 색이 회색 → 노랑 → 빨강으로 바뀝니다.</p>
      <div class="field">
        <label class="field-label" for="cc-text">자기소개</label>
        <div class="cc-wrap">
          <textarea class="cc-area" id="cc-text" rows="4" maxlength="80" placeholder="80자 이내로 자유롭게 적어 주세요"></textarea>
          <div class="cc-meta" id="cc-meta" data-state="idle">
            <svg class="cc-gauge" viewBox="0 0 20 20" aria-hidden="true">
              <circle class="cc-track" cx="10" cy="10" r="8"/>
              <circle class="cc-fill" id="cc-fill" cx="10" cy="10" r="8"/>
            </svg>
            <span class="cc-count" id="cc-count" aria-live="polite">0 / 80</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function(){
      var area = document.getElementById("cc-text");
      var meta = document.getElementById("cc-meta");
      var fill = document.getElementById("cc-fill");
      var count = document.getElementById("cc-count");
      var MAX = 80;
      var CIRC = 50.27;
      area.addEventListener("input", function(){
        var len = area.value.length;
        var ratio = Math.min(1, len / MAX);
        fill.style.strokeDashoffset = String(CIRC * (1 - ratio));
        count.textContent = len + " / " + MAX;
        meta.setAttribute("data-state", len >= MAX ? "max" : (ratio >= 0.7 ? "warn" : "idle"));
      });
      window.__reset = function(){
        document.querySelectorAll("input, textarea").forEach(function(el){
          el.value = "";
          el.dispatchEvent(new Event("input", { bubbles: true }));
          el.blur();
        });
        if (window.__resetDemo) window.__resetDemo();
      };
    })();
  </script>
</body>
</html>
