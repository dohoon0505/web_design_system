<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>09. 커스텀 셀렉트 — Form Input Micro Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: background 0.2s ease, color 0.2s ease; }
    .demo-reset:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 11px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; animation: hint-pulse 2.4s ease-in-out infinite; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .stage {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 64px 20px 48px;
    }
    .form-card {
      width: 100%; max-width: 380px;
      background: #0d0d0d; border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px; padding: 32px 28px 28px;
      box-shadow: 0 24px 60px -30px rgba(0,0,0,0.85);
    }
    .form-title { margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .form-desc { margin: 0 0 24px; font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.45); }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field-label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: rgba(255,255,255,0.55); }
    .text-input {
      width: 100%; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
      padding: 13px 14px; font: 500 15px/1.4 "Pretendard Variable","Pretendard",sans-serif;
      color: #fff; outline: none; caret-color: #3b82f6;
      transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.28); }
    .text-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    
    .sm-select { position: relative; }
    .sm-trigger { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.16); border-radius: 10px; padding: 13px 14px; font: 500 15px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: #fff; cursor: pointer; outline: none; text-align: left; transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out; }
    .sm-select.is-open .sm-trigger, .sm-trigger:focus-visible { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    .sm-value.is-placeholder { color: rgba(255,255,255,0.35); }
    .sm-chevron { width: 12px; height: 8px; flex: none; color: rgba(255,255,255,0.45); transition: transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94); }
    .sm-select.is-open .sm-chevron { transform: rotate(180deg); }
    .sm-list { position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 10; margin: 0; padding: 6px; list-style: none; background: #141414; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; box-shadow: 0 16px 40px -12px rgba(0,0,0,0.8); opacity: 0; transform: translateY(-6px) scale(0.98); transform-origin: top center; pointer-events: none; transition: opacity 0.18s ease-out, transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94); }
    .sm-select.is-open .sm-list { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .sm-option { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px; border-radius: 8px; font: 500 14px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.75); cursor: pointer; transition: background 0.15s ease-out, color 0.15s ease-out; }
    .sm-option:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .sm-select.is-open .sm-option { animation: sm-in 0.22s cubic-bezier(0.25,0.46,0.45,0.94) both; }
    .sm-select.is-open .sm-option:nth-child(2) { animation-delay: 0.045s; }
    .sm-select.is-open .sm-option:nth-child(3) { animation-delay: 0.09s; }
    .sm-select.is-open .sm-option:nth-child(4) { animation-delay: 0.135s; }
    @keyframes sm-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .sm-option.is-selected { color: #fff; }
    .sm-check { width: 16px; height: 16px; flex: none; color: #3b82f6; opacity: 0; transform: scale(0.5); transition: opacity 0.18s ease-out, transform 0.18s cubic-bezier(0.34,1.56,0.64,1); }
    .sm-option.is-selected .sm-check { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">09 · 커스텀 셀렉트</span>
  </div>
  <div class="demo-hint">셀렉트를 열어 보세요</div>

  <main class="stage">
    <div class="form-card">
      <h2 class="form-title">관심 분야 선택</h2>
      <p class="form-desc">셀렉트를 열면 옵션이 차례로 내려오고, 선택하면 체크가 찍히며 접힙니다.</p>
      <div class="field">
        <span class="field-label" id="sm-caption">관심 분야</span>
        <div class="sm-select" id="sm-select">
          <button class="sm-trigger" id="sm-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="sm-caption sm-value">
            <span class="sm-value is-placeholder" id="sm-value">선택해 주세요</span>
            <svg class="sm-chevron" viewBox="0 0 12 8" fill="none" aria-hidden="true"><path d="M1 1.5l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <ul class="sm-list" id="sm-list" role="listbox" aria-labelledby="sm-caption">
            <li class="sm-option" role="option" aria-selected="false" tabindex="-1">인터랙션 디자인<svg class="sm-check" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></li>
            <li class="sm-option" role="option" aria-selected="false" tabindex="-1">프론트엔드 개발<svg class="sm-check" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></li>
            <li class="sm-option" role="option" aria-selected="false" tabindex="-1">브랜드 디자인<svg class="sm-check" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></li>
            <li class="sm-option" role="option" aria-selected="false" tabindex="-1">콘텐츠 마케팅<svg class="sm-check" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function(){
      var select = document.getElementById("sm-select");
      var trigger = document.getElementById("sm-trigger");
      var valueEl = document.getElementById("sm-value");
      var options = Array.prototype.slice.call(select.querySelectorAll(".sm-option"));
      var closeTimer = null;
      function setOpen(open){
        select.classList.toggle("is-open", open);
        trigger.setAttribute("aria-expanded", open ? "true" : "false");
      }
      trigger.addEventListener("click", function(){
        setOpen(!select.classList.contains("is-open"));
      });
      options.forEach(function(opt){
        opt.addEventListener("click", function(){
          options.forEach(function(o){
            o.classList.remove("is-selected");
            o.setAttribute("aria-selected", "false");
          });
          opt.classList.add("is-selected");
          opt.setAttribute("aria-selected", "true");
          valueEl.textContent = opt.textContent.trim();
          valueEl.classList.remove("is-placeholder");
          clearTimeout(closeTimer);
          closeTimer = setTimeout(function(){ setOpen(false); }, 220);
        });
      });
      document.addEventListener("click", function(e){
        if (!select.contains(e.target)) setOpen(false);
      });
      window.__resetDemo = function(){
        clearTimeout(closeTimer);
        options.forEach(function(o){
          o.classList.remove("is-selected");
          o.setAttribute("aria-selected", "false");
        });
        valueEl.textContent = "선택해 주세요";
        valueEl.classList.add("is-placeholder");
        setOpen(false);
      };
      window.__reset = function(){
        document.querySelectorAll("input, textarea").forEach(function(el){
          el.value = "";
          el.dispatchEvent(new Event("input", { bubbles: true }));
          el.blur();
        });
        if (window.__resetDemo) window.__resetDemo();
      };
    })();
  </script>
</body>
</html>
