<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06. 비밀번호 표시 토글 — Form Input Micro Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: background 0.2s ease, color 0.2s ease; }
    .demo-reset:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 11px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; animation: hint-pulse 2.4s ease-in-out infinite; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .stage {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 64px 20px 48px;
    }
    .form-card {
      width: 100%; max-width: 380px;
      background: #0d0d0d; border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px; padding: 32px 28px 28px;
      box-shadow: 0 24px 60px -30px rgba(0,0,0,0.85);
    }
    .form-title { margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .form-desc { margin: 0 0 24px; font-size: 13px; line-height: 1.55; color: rgba(255,255,255,0.45); }
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    .field-label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: rgba(255,255,255,0.55); }
    .text-input {
      width: 100%; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.16); border-radius: 10px;
      padding: 13px 14px; font: 500 15px/1.4 "Pretendard Variable","Pretendard",sans-serif;
      color: #fff; outline: none; caret-color: #3b82f6;
      transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.28); }
    .text-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    
    .pr-wrap { position: relative; }
    .pr-input { padding-right: 48px; }
    .pr-toggle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; border: 0; border-radius: 8px; color: rgba(255,255,255,0.45); cursor: pointer; transition: color 0.18s ease-out, background 0.18s ease-out; }
    .pr-toggle:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
    .pr-toggle svg { width: 20px; height: 20px; }
    .pr-slash { stroke-dasharray: 22; stroke-dashoffset: 0; transition: stroke-dashoffset 0.24s cubic-bezier(0.25,0.46,0.45,0.94); }
    .pr-toggle.is-visible { color: #3b82f6; }
    .pr-toggle.is-visible .pr-slash { stroke-dashoffset: 22; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">06 · 비밀번호 표시 토글</span>
  </div>
  <div class="demo-hint">눈 아이콘을 눌러 보세요</div>

  <main class="stage">
    <div class="form-card">
      <h2 class="form-title">비밀번호 표시 토글</h2>
      <p class="form-desc">눈 아이콘을 누르면 마스킹이 풀리고, 사선 획이 지워지거나 다시 그려집니다.</p>
      <div class="field">
        <label class="field-label" for="pr-pass">비밀번호</label>
        <div class="pr-wrap">
          <input class="text-input pr-input" id="pr-pass" type="password" value="Interaction2026!" autocomplete="new-password">
          <button class="pr-toggle" id="pr-toggle" type="button" aria-label="비밀번호 표시" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M2.5 12S6 5.8 12 5.8 21.5 12 21.5 12 18 18.2 12 18.2 2.5 12 2.5 12z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="2.7" stroke="currentColor" stroke-width="1.6"/>
              <line class="pr-slash" x1="4.8" y1="4.2" x2="19.2" y2="19.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function(){
      var input = document.getElementById("pr-pass");
      var toggle = document.getElementById("pr-toggle");
      toggle.addEventListener("click", function(){
        var visible = toggle.classList.toggle("is-visible");
        input.type = visible ? "text" : "password";
        toggle.setAttribute("aria-pressed", visible ? "true" : "false");
        toggle.setAttribute("aria-label", visible ? "비밀번호 숨기기" : "비밀번호 표시");
      });
      window.__resetDemo = function(){
        input.value = "Interaction2026!";
        input.type = "password";
        toggle.classList.remove("is-visible");
        toggle.setAttribute("aria-pressed", "false");
        toggle.setAttribute("aria-label", "비밀번호 표시");
      };
      window.__reset = function(){
        document.querySelectorAll("input, textarea").forEach(function(el){
          el.value = "";
          el.dispatchEvent(new Event("input", { bubbles: true }));
          el.blur();
        });
        if (window.__resetDemo) window.__resetDemo();
      };
    })();
  </script>
</body>
</html>
