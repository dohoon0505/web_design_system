<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07. 슬라이스 스태거 — Image Hover Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 11px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; animation: hint-pulse 2.4s ease-in-out infinite; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .showcase {
      min-height: 100vh; display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center;
      gap: 32px; padding: 48px 40px;
    }
    .card { margin: 0; width: 240px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .card-frame {
      position: relative; overflow: hidden;
      height: 300px; border-radius: 16px; background: #111;
      transform: translateZ(0);
    }
    .card-art { position: absolute; inset: 0; }
    .art-aurora { background:
      radial-gradient(90% 70% at 18% 12%, rgba(56,189,248,0.85) 0%, rgba(56,189,248,0) 55%),
      radial-gradient(80% 80% at 82% 22%, rgba(167,139,250,0.9) 0%, rgba(167,139,250,0) 58%),
      radial-gradient(120% 90% at 50% 105%, rgba(34,211,238,0.7) 0%, rgba(34,211,238,0) 60%),
      linear-gradient(180deg, #0b1026 0%, #101630 100%); }
    .art-ember { background:
      radial-gradient(85% 70% at 22% 18%, rgba(251,146,60,0.9) 0%, rgba(251,146,60,0) 55%),
      radial-gradient(90% 80% at 80% 70%, rgba(244,63,94,0.8) 0%, rgba(244,63,94,0) 58%),
      radial-gradient(70% 60% at 60% 8%, rgba(253,224,71,0.5) 0%, rgba(253,224,71,0) 55%),
      linear-gradient(180deg, #1c0b10 0%, #220d18 100%); }
    .art-moss { background:
      radial-gradient(90% 75% at 25% 80%, rgba(52,211,153,0.85) 0%, rgba(52,211,153,0) 58%),
      radial-gradient(80% 70% at 78% 18%, rgba(163,230,53,0.55) 0%, rgba(163,230,53,0) 55%),
      radial-gradient(70% 80% at 70% 90%, rgba(20,184,166,0.6) 0%, rgba(20,184,166,0) 60%),
      linear-gradient(180deg, #07150f 0%, #0a1a14 100%); }
    .card-meta { display: flex; flex-direction: column; gap: 4px; padding: 14px 4px 0; }
    .card-title { font: 600 15px/1.3 "Pretendard Variable","Pretendard",sans-serif; color: #fff; }
    .card-sub { font: 400 12px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); }
    
    .card-wide { width: 340px; }
    .frame-slices { display: flex; }
    .slice { width: 25%; height: 100%; background-size: 400% 100%; transition: transform 0.45s cubic-bezier(0.22,1,0.36,1); will-change: transform; }
    .slice:nth-child(1) { background-position: 0% 0; }
    .slice:nth-child(2) { background-position: 33.333% 0; transition-delay: 0.05s; }
    .slice:nth-child(3) { background-position: 66.667% 0; transition-delay: 0.1s; }
    .slice:nth-child(4) { background-position: 100% 0; transition-delay: 0.15s; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <span class="demo-label">07 · 슬라이스 스태거</span>
  </div>
  <div class="demo-hint">카드에 호버해보세요 ↗</div>

  <main class="showcase">
    <figure class="card card-wide">
      <div class="card-frame frame-slices">
        <div class="slice art-aurora"></div>
        <div class="slice art-aurora"></div>
        <div class="slice art-aurora"></div>
        <div class="slice art-aurora"></div>
      </div>
      <figcaption class="card-meta">
        <span class="card-title">오로라 흐름</span>
        <span class="card-sub">4분할 슬라이스 · 커서 좌우로 움직여보세요</span>
      </figcaption>
    </figure>
  </main>

  <script>
    (function(){
      var frame = document.querySelector(".frame-slices");
      var slices = frame.querySelectorAll(".slice");
      var base = [-16, 10, -10, 16];
      frame.addEventListener("mousemove", function(e){
        var rect = frame.getBoundingClientRect();
        var nx = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
        var i, ty;
        for (i = 0; i < slices.length; i++) {
          ty = base[i] + nx * 6 * (i - 1.5);
          slices[i].style.transform = "translateY(" + ty.toFixed(1) + "px)";
        }
      });
      frame.addEventListener("mouseleave", function(){
        var i;
        for (i = 0; i < slices.length; i++) {
          slices[i].style.transform = "translateY(0)";
        }
      });
    })();
  </script>
</body>
</html>
