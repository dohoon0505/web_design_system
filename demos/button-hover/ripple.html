<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08. 리플 — Button Hover Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 11px/1.4 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; z-index: 100; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; animation: hint-pulse 2.4s ease-in-out infinite; }
    @keyframes hint-pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .showcase {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 40px;
    }
    .btn {
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; gap: 10px;
      font: 600 16px/1 "Pretendard Variable","Pretendard",sans-serif;
      text-decoration: none; cursor: pointer; border: 0; outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-label, .btn-icon { position: relative; z-index: 1; }
    .btn-icon { font-size: 18px; transition: transform 0.3s ease, opacity 0.3s ease; }
    
    .btn-primary { color: #000; background: #fff; padding: 18px 36px; border-radius: 999px; }
    .btn-outline { color: rgba(255,255,255,0.9); background: transparent; border: 1px solid rgba(255,255,255,0.25); padding: 14px 28px; border-radius: 999px; }
    .btn-ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-expand 0.6s ease-out forwards; pointer-events: none; z-index: 0; }
    .btn-primary .btn-ripple { background: rgba(59,130,246,0.25); }
    .btn-outline .btn-ripple { background: rgba(255,255,255,0.12); }
    @keyframes ripple-expand { to { transform: scale(4); opacity: 0; } }
  </style>
</head>
<body>
  <div class="demo-controls">
    <span class="demo-label">08 · 리플</span>
  </div>
  <div class="demo-hint">버튼에 호버해보세요 ↗</div>

  <main class="showcase">
    <a class="btn btn-primary" href="#" onclick="return false">
      <span class="btn-label">시작하기</span>
      <span class="btn-icon">→</span>
    </a>
    <a class="btn btn-outline" href="#" onclick="return false">
      <span class="btn-label">자세히 보기</span>
    </a>
  </main>

  <script>
    (function(){
      document.querySelectorAll(".btn").forEach(function(btn){
        btn.addEventListener("mouseenter", function(e){
          var rect = btn.getBoundingClientRect();
          var ripple = document.createElement("span");
          ripple.className = "btn-ripple";
          var size = Math.max(rect.width, rect.height);
          ripple.style.width = ripple.style.height = size + "px";
          ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
          ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
          btn.appendChild(ripple);
          ripple.addEventListener("animationend", function(){ ripple.remove(); });
        });
      });
    })();
  </script>
</body>
</html>
