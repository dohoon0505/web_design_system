<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02. 줄별 슬라이드 업 — Live Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 10;
    }
    .demo-replay {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-replay:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 8vw; }
    .reveal { font: 600 32px/1.5 "Pretendard Variable","Pretendard",system-ui; color: #fff; max-width: 900px; letter-spacing: -0.01em; }
    .reveal .ln { overflow: hidden; padding: 4px 0; }
    .reveal .ln > span { display: inline-block; transform: translateY(115%); transition: transform 900ms cubic-bezier(0.22,1,0.36,1); }
    .reveal .ln.on > span { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-replay" type="button" onclick="window.__replay && window.__replay()">▶ 다시 재생</button>
    <span class="demo-label">02 · 줄별 슬라이드 업</span>
  </div>
  <div class="stage"><div class="reveal"><div class="ln"><span>강력하고 확장된 가능성을 제공합니다.</span></div><div class="ln"><span>디자인과 로직을 한 곳에서 결합하여,</span></div><div class="ln"><span>동적인 동작과 애니메이션,</span></div><div class="ln"><span>상태 기반 인터랙션을 매번 처음부터 만들지 않아도 됩니다.</span></div></div></div>
  <script>
    var lns = document.querySelectorAll(".reveal .ln");
    function play(){
      lns.forEach(function(ln){ ln.classList.remove("on"); });
      setTimeout(function(){
        lns.forEach(function(ln, i){ setTimeout(function(){ ln.classList.add("on"); }, i * 160); });
      }, 60);
    }
    window.__replay = play;
    play();
  </script>
</body>
</html>
