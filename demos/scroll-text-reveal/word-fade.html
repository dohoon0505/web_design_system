<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01. 단어별 페이드 인 — Live Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 10;
    }
    .demo-replay {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-replay:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 8vw; }
    .reveal { font: 700 36px/1.5 "Pretendard Variable","Pretendard",system-ui; color: #fff; max-width: 900px; margin: 0; text-align: left; letter-spacing: -0.01em; }
    .reveal .w { display: inline-block; opacity: 0; transform: translateY(12px); transition: opacity 700ms cubic-bezier(0.2,0,0,1), transform 700ms cubic-bezier(0.2,0,0,1); }
    .reveal .w.on { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-replay" type="button" onclick="window.__replay && window.__replay()">▶ 다시 재생</button>
    <span class="demo-label">01 · 단어별 페이드 인</span>
  </div>
  <div class="stage"><p class="reveal" data-orig="강력하고 확장된 가능성을 제공합니다. 디자인과 로직을 한 곳에서 결합하여, 동적인 동작과 애니메이션, 상태 기반 인터랙션을 매번 처음부터 만들지 않아도 됩니다. 일관되고 확장 가능한 인터페이스를 더 쉽게 구축하게 해 주고, 표준 요소만으로는 닿을 수 없는 훨씬 더 창의적이고 기능적인 가능성을 열어줍니다.">강력하고 확장된 가능성을 제공합니다. 디자인과 로직을 한 곳에서 결합하여, 동적인 동작과 애니메이션, 상태 기반 인터랙션을 매번 처음부터 만들지 않아도 됩니다. 일관되고 확장 가능한 인터페이스를 더 쉽게 구축하게 해 주고, 표준 요소만으로는 닿을 수 없는 훨씬 더 창의적이고 기능적인 가능성을 열어줍니다.</p></div>
  <script>
    var el = document.querySelector(".reveal");
    var orig = el.dataset.orig || el.textContent;
    function play(){
      var words = orig.split(" ");
      el.innerHTML = words.map(function(w){ return "<span class=\"w\">" + w + "</span>"; }).join(" ");
      var spans = el.querySelectorAll(".w");
      spans.forEach(function(s, i){ s.style.transitionDelay = (i * 70) + "ms"; });
      setTimeout(function(){ spans.forEach(function(s){ s.classList.add("on"); }); }, 60);
    }
    window.__replay = play;
    play();
  </script>
</body>
</html>
