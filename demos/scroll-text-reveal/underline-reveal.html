<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10. 밑줄 동반 진입 — Live Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 10;
    }
    .demo-replay {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-replay:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 8vw; }
    .reveal { font: 700 56px/1.35 "Pretendard Variable","Pretendard",system-ui; color: #fff; margin: 0; display: inline-flex; flex-direction: column; gap: 12px; align-items: flex-start; letter-spacing: -0.01em; }
    .reveal .t { display: inline-block; opacity: 0; transform: translateY(20px); transition: opacity 700ms, transform 700ms cubic-bezier(0.2,0,0,1); }
    .reveal .u { display: block; height: 4px; width: 100%; background: #fff; transform: scaleX(0); transform-origin: left; transition: transform 900ms cubic-bezier(0.22,1,0.36,1) 300ms; }
    .reveal.on .t { opacity: 1; transform: translateY(0); }
    .reveal.on .u { transform: scaleX(1); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-replay" type="button" onclick="window.__replay && window.__replay()">▶ 다시 재생</button>
    <span class="demo-label">10 · 밑줄 동반 진입</span>
  </div>
  <div class="stage"><div class="reveal"><span class="t">주목해서 읽어 주세요.</span><span class="u"></span></div></div>
  <script>
    var el = document.querySelector(".reveal");
    function play(){
      el.classList.remove("on");
      void el.offsetHeight;
      setTimeout(function(){ el.classList.add("on"); }, 50);
    }
    window.__replay = play;
    play();
  </script>
</body>
</html>
