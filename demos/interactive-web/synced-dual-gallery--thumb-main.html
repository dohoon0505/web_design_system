<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07-A. 듀얼 동기 갤러리 — 썸네일-메인 동기 크로스페이드</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.14); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .stage { min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .iw-eyebrow { font: 600 12px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent,#8ab4ff); margin: 0; }
    .iw-head { font: 800 clamp(28px,4.4vw,56px)/1.12 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: -0.02em; color: #fff; margin: 0; }
    .iw-sub { font: 700 clamp(20px,2.6vw,30px)/1.3 "Pretendard Variable","Pretendard",sans-serif; color: #fff; margin: 0; }
    .iw-body { font: 400 clamp(14px,1.4vw,17px)/1.7 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.62); margin: 0; }
    .iw-cta { display: inline-flex; align-items: center; gap: 8px; font: 600 13px/1 "Pretendard Variable","Pretendard",sans-serif; color: #fff; border: 1px solid rgba(255,255,255,0.32); border-radius: 999px; padding: 14px 24px; text-decoration: none; }
    .iw-tag { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .demo-progress { display: none; }
    .tm-wrap { width: min(820px, 90vw); display: flex; flex-direction: column; gap: 16px; }
    .tm-main { position: relative; aspect-ratio: 16/9; border-radius: 18px; overflow: hidden; }
    .tm-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 200ms ease; display: flex; flex-direction: column; justify-content: flex-end; padding: 28px; }
    .tm-slide.is-on { opacity: 1; }
    .tm-s0 { background: linear-gradient(140deg,#18324a,#0a161f); }
    .tm-s1 { background: linear-gradient(140deg,#1a4038,#0a1a16); }
    .tm-s2 { background: linear-gradient(140deg,#2a2440,#120e1e); }
    .tm-wrap .iw-tag { --accent: #5cc8ff; color: #5cc8ff; margin-bottom: 10px; }
    .tm-meta { position: absolute; top: 22px; right: 24px; display: flex; align-items: center; gap: 8px; }
    .tm-count { font: 800 22px/1 "Pretendard Variable",sans-serif; color: #fff; }
    .tm-total { font: 500 13px/1 "Pretendard Variable",sans-serif; color: rgba(255,255,255,0.5); }
    .tm-bar { width: 80px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 999px; overflow: hidden; margin-left: 8px; }
    .tm-fill { height: 100%; width: 33%; background: #5cc8ff; transition: width 200ms ease; }
    .tm-thumbs { display: flex; gap: 12px; }
    .tm-thumb { flex: 1; height: 70px; border: 1px solid rgba(255,255,255,0.14); border-radius: 12px; cursor: pointer; padding: 0; transition: transform 200ms ease, border-color 200ms ease; }
    .tm-thumb.is-on { border-color: #5cc8ff; transform: scale(1.04); }
    .tm-t0 { background: linear-gradient(140deg,#18324a,#0a161f); }
    .tm-t1 { background: linear-gradient(140deg,#1a4038,#0a1a16); }
    .tm-t2 { background: linear-gradient(140deg,#2a2440,#120e1e); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">07-A · 듀얼 동기 갤러리</span>
  </div>
  <div class="demo-hint">CLICK</div>
  <div class="demo-progress"><div></div></div>

  <main class="stage">
    <section class="tm-wrap">
      <div class="tm-main">
        <div class="tm-slide tm-s0 is-on"><span class="iw-tag">CLINIC 01</span><h3 class="iw-head">도수 치료실</h3></div>
        <div class="tm-slide tm-s1"><span class="iw-tag">CLINIC 02</span><h3 class="iw-head">물리 치료실</h3></div>
        <div class="tm-slide tm-s2"><span class="iw-tag">CLINIC 03</span><h3 class="iw-head">재활 운동실</h3></div>
        <div class="tm-meta"><span class="tm-count">01</span><span class="tm-total">/ 03</span><div class="tm-bar"><div class="tm-fill"></div></div></div>
      </div>
      <div class="tm-thumbs">
        <button class="tm-thumb tm-t0 is-on" data-i="0" aria-label="도수 치료실"></button>
        <button class="tm-thumb tm-t1" data-i="1" aria-label="물리 치료실"></button>
        <button class="tm-thumb tm-t2" data-i="2" aria-label="재활 운동실"></button>
      </div>
    </section>
  </main>

  <script>
    (function(){
      var stage = document.querySelector(".stage");
      var progressFill = document.querySelector(".demo-progress > div");
      var slides = stage.querySelectorAll(".tm-slide");
      var thumbs = stage.querySelectorAll(".tm-thumb");
      var count = stage.querySelector(".tm-count");
      var fill = stage.querySelector(".tm-fill");
      var N = slides.length;
      function go(n){
        for (var i = 0; i < N; i++){
          slides[i].classList.toggle("is-on", i === n);
          thumbs[i].classList.toggle("is-on", i === n);
        }
        count.textContent = ("0" + (n + 1)).slice(-2);
        fill.style.width = ((n + 1) / N * 100) + "%";
      }
      for (var i = 0; i < N; i++){
        (function(k){ thumbs[k].addEventListener("click", function(){ go(k); }); })(i);
      }
      window.__reset = function(){ go(0); };
    })();
  </script>
</body>
</html>
