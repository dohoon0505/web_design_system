<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07-B. 듀얼 동기 갤러리 — 텍스트-이미지 페어 내비</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.14); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .stage { min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .iw-eyebrow { font: 600 12px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent,#8ab4ff); margin: 0; }
    .iw-head { font: 800 clamp(28px,4.4vw,56px)/1.12 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: -0.02em; color: #fff; margin: 0; }
    .iw-sub { font: 700 clamp(20px,2.6vw,30px)/1.3 "Pretendard Variable","Pretendard",sans-serif; color: #fff; margin: 0; }
    .iw-body { font: 400 clamp(14px,1.4vw,17px)/1.7 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.62); margin: 0; }
    .iw-cta { display: inline-flex; align-items: center; gap: 8px; font: 600 13px/1 "Pretendard Variable","Pretendard",sans-serif; color: #fff; border: 1px solid rgba(255,255,255,0.32); border-radius: 999px; padding: 14px 24px; text-decoration: none; }
    .iw-tag { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .pn-wrap { width: min(960px, 90vw); display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 44px; align-items: center; }
    .pn-text { position: relative; min-height: 210px; }
    .pn-tslide { position: absolute; inset: 0; opacity: 0; transform: translateY(24px); transition: opacity 200ms ease, transform 200ms ease; pointer-events: none; }
    .pn-tslide.is-on { opacity: 1; transform: none; pointer-events: auto; }
    .pn-wrap .iw-tag { --accent: #8ab4ff; color: #8ab4ff; margin-bottom: 14px; display: block; }
    .pn-tslide .iw-head { margin-bottom: 14px; }
    .pn-media { position: relative; aspect-ratio: 4/3; border-radius: 18px; overflow: hidden; }
    .pn-mslide { position: absolute; inset: 0; opacity: 0; transition: opacity 200ms ease; }
    .pn-mslide.is-on { opacity: 1; }
    .pn-m0 { background: linear-gradient(140deg,#2b2f3a,#0a0b0e); }
    .pn-m1 { background: linear-gradient(140deg,#1f3340,#0a141a); }
    .pn-m2 { background: linear-gradient(140deg,#33291f,#1a120a); }
    .pn-nav { position: absolute; bottom: 18px; left: 18px; right: 18px; display: flex; align-items: center; justify-content: space-between; z-index: 2; }
    .pn-prev,.pn-next { width: 44px; height: 44px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.24); background: rgba(0,0,0,0.3); color: #fff; font-size: 18px; cursor: pointer; transition: background 200ms ease; }
    .pn-prev:hover,.pn-next:hover { background: rgba(255,255,255,0.16); }
    .pn-idx { font: 600 14px/1 "Pretendard Variable",sans-serif; color: #fff; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">07-B · 듀얼 동기 갤러리</span>
  </div>
  <div class="demo-hint">CLICK</div>
  <div class="demo-progress"><div></div></div>

  <main class="stage">
    <section class="pn-wrap">
      <div class="pn-text">
        <div class="pn-tslide is-on" data-i="0"><span class="iw-tag">PRODUCT 01</span><h3 class="iw-head">커넥터 어셈블리</h3><p class="iw-body">차량용 고정밀 커넥터 모듈로 안정적 전기 접속을 보장합니다.</p></div>
        <div class="pn-tslide" data-i="1"><span class="iw-tag">PRODUCT 02</span><h3 class="iw-head">클립 패스너</h3><p class="iw-body">진동 환경에서도 풀림 없는 체결력을 유지하는 고정 부품.</p></div>
        <div class="pn-tslide" data-i="2"><span class="iw-tag">PRODUCT 03</span><h3 class="iw-head">하우징 모듈</h3><p class="iw-body">정밀 사출로 성형한 경량·고강성 구조 하우징.</p></div>
      </div>
      <div class="pn-media">
        <div class="pn-mslide pn-m0 is-on"></div>
        <div class="pn-mslide pn-m1"></div>
        <div class="pn-mslide pn-m2"></div>
        <div class="pn-nav"><button class="pn-prev" aria-label="이전">←</button><span class="pn-idx">01 / 03</span><button class="pn-next" aria-label="다음">→</button></div>
      </div>
    </section>
  </main>

  <script>
    (function(){
      var stage = document.querySelector(".stage");
      var progressFill = document.querySelector(".demo-progress > div");
      var texts = stage.querySelectorAll(".pn-tslide");
      var medias = stage.querySelectorAll(".pn-mslide");
      var idxEl = stage.querySelector(".pn-idx");
      var N = texts.length, cur = 0;
      function go(n){
        cur = (n + N) % N;
        for (var i = 0; i < N; i++){
          texts[i].classList.toggle("is-on", i === cur);
          medias[i].classList.toggle("is-on", i === cur);
        }
        idxEl.textContent = ("0" + (cur + 1)).slice(-2) + " / 0" + N;
        if (progressFill) progressFill.style.width = ((cur + 1) / N * 100) + "%";
      }
      stage.querySelector(".pn-prev").addEventListener("click", function(){ go(cur - 1); });
      stage.querySelector(".pn-next").addEventListener("click", function(){ go(cur + 1); });
      window.__reset = function(){ go(0); };
    })();
  </script>
</body>
</html>
