<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07-C. 듀얼 동기 갤러리 — 핫스팟 스테이지 갤러리</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.14); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .stage { min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .iw-eyebrow { font: 600 12px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent,#8ab4ff); margin: 0; }
    .iw-head { font: 800 clamp(28px,4.4vw,56px)/1.12 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: -0.02em; color: #fff; margin: 0; }
    .iw-sub { font: 700 clamp(20px,2.6vw,30px)/1.3 "Pretendard Variable","Pretendard",sans-serif; color: #fff; margin: 0; }
    .iw-body { font: 400 clamp(14px,1.4vw,17px)/1.7 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.62); margin: 0; }
    .iw-cta { display: inline-flex; align-items: center; gap: 8px; font: 600 13px/1 "Pretendard Variable","Pretendard",sans-serif; color: #fff; border: 1px solid rgba(255,255,255,0.32); border-radius: 999px; padding: 14px 24px; text-decoration: none; }
    .iw-tag { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .demo-progress { display: none; }
    .hs-wrap { width: min(860px, 92vw); display: flex; flex-direction: column; gap: 16px; }
    .hs-stage { position: relative; aspect-ratio: 16/9; border-radius: 18px; overflow: hidden; }
    .hs-img { position: absolute; inset: 0; background: linear-gradient(140deg,#22303f,#0c141c); }
    .hs-dot { position: absolute; width: 22px; height: 22px; border-radius: 999px; border: none; background: #8ab4ff; cursor: pointer; transform: translate(-50%,-50%); transition: transform 200ms ease; padding: 0; z-index: 2; }
    .hs-dot::after { content: ""; position: absolute; inset: -9px; border: 1px solid rgba(138,180,255,0.5); border-radius: 999px; opacity: 0; transform: scale(0.6); transition: opacity 200ms ease, transform 200ms ease; }
    .hs-dot:hover { transform: translate(-50%,-50%) scale(1.15); }
    .hs-dot.is-on::after { opacity: 1; transform: scale(1); }
    .hs-cap { position: absolute; min-width: 150px; padding: 14px 16px; background: #0d0d0d; border: 1px solid rgba(255,255,255,0.16); border-radius: 12px; opacity: 0; transform: translateY(8px); transition: opacity 200ms ease, transform 200ms ease; pointer-events: none; z-index: 3; }
    .hs-cap.is-on { opacity: 1; transform: none; }
    .hs-cap strong { display: block; font: 700 16px/1.2 "Pretendard Variable",sans-serif; color: #fff; margin-bottom: 6px; }
    .hs-cap span { font: 400 13px/1.4 "Pretendard Variable",sans-serif; color: rgba(255,255,255,0.6); }
    .hs-list { display: flex; gap: 10px; }
    .hs-li { flex: 1; padding: 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; background: transparent; color: rgba(255,255,255,0.5); font: 600 14px/1 "Pretendard Variable",sans-serif; cursor: pointer; transition: border-color 200ms ease, color 200ms ease, background 200ms ease; }
    .hs-li.is-on { border-color: #8ab4ff; color: #fff; background: rgba(138,180,255,0.1); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">07-C · 듀얼 동기 갤러리</span>
  </div>
  <div class="demo-hint">CLICK</div>
  <div class="demo-progress"><div></div></div>

  <main class="stage">
    <section class="hs-wrap">
      <div class="hs-stage">
        <div class="hs-img"></div>
        <button class="hs-dot is-on" data-i="0" style="left:26%;top:34%" aria-label="커넥터부"></button>
        <button class="hs-dot" data-i="1" style="left:62%;top:46%" aria-label="체결부"></button>
        <button class="hs-dot" data-i="2" style="left:44%;top:70%" aria-label="하우징부"></button>
        <div class="hs-cap is-on" data-i="0" style="left:26%;top:44%"><strong>커넥터부</strong><span>고정밀 결합 구조</span></div>
        <div class="hs-cap" data-i="1" style="left:50%;top:56%"><strong>체결부</strong><span>무진동 풀림 방지</span></div>
        <div class="hs-cap" data-i="2" style="left:30%;top:48%"><strong>하우징부</strong><span>경량 고강성 사출</span></div>
      </div>
      <div class="hs-list">
        <button class="hs-li is-on" data-i="0">① 커넥터부</button>
        <button class="hs-li" data-i="1">② 체결부</button>
        <button class="hs-li" data-i="2">③ 하우징부</button>
      </div>
    </section>
  </main>

  <script>
    (function(){
      var stage = document.querySelector(".stage");
      var progressFill = document.querySelector(".demo-progress > div");
      var dots = stage.querySelectorAll(".hs-dot");
      var caps = stage.querySelectorAll(".hs-cap");
      var lis = stage.querySelectorAll(".hs-li");
      function focus(n){
        for (var i = 0; i < dots.length; i++){
          dots[i].classList.toggle("is-on", i === n);
          caps[i].classList.toggle("is-on", i === n);
          lis[i].classList.toggle("is-on", i === n);
        }
      }
      for (var i = 0; i < dots.length; i++){
        (function(k){
          dots[k].addEventListener("click", function(){ focus(k); });
          lis[k].addEventListener("click", function(){ focus(k); });
        })(i);
      }
      focus(0);
      window.__reset = function(){ focus(0); };
    })();
  </script>
</body>
</html>
