<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06-C. 호버 포커스 풀밴드 — 리스트-미디어 동기</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.14); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .stage { min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .iw-eyebrow { font: 600 12px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent,#8ab4ff); margin: 0; }
    .iw-head { font: 800 clamp(28px,4.4vw,56px)/1.12 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: -0.02em; color: #fff; margin: 0; }
    .iw-sub { font: 700 clamp(20px,2.6vw,30px)/1.3 "Pretendard Variable","Pretendard",sans-serif; color: #fff; margin: 0; }
    .iw-body { font: 400 clamp(14px,1.4vw,17px)/1.7 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.62); margin: 0; }
    .iw-cta { display: inline-flex; align-items: center; gap: 8px; font: 600 13px/1 "Pretendard Variable","Pretendard",sans-serif; color: #fff; border: 1px solid rgba(255,255,255,0.32); border-radius: 999px; padding: 14px 24px; text-decoration: none; }
    .iw-tag { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .lm-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .lm-bg { position: absolute; inset: 0; opacity: 0; transition: opacity 200ms ease; }
    .lm-bg.is-on { opacity: 1; }
    .lm-bg0 { background: linear-gradient(135deg,#16243f,#0a1322); }
    .lm-bg1 { background: linear-gradient(135deg,#1f2a3f,#0c1018); }
    .lm-bg2 { background: linear-gradient(135deg,#241a36,#100c1a); }
    .lm-bg3 { background: linear-gradient(135deg,#1a3030,#0a1614); }
    .lm-inner { position: relative; z-index: 2; width: min(960px, 90vw); display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    .lm-list { list-style: none; margin: 0; padding: 0; }
    .lm-item { display: flex; align-items: baseline; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; opacity: 0.4; transition: opacity 200ms ease; }
    .lm-item.is-on { opacity: 1; }
    .lm-num { font: 700 13px/1 "Pretendard Variable",sans-serif; color: #c9a86a; }
    .lm-name { font: 700 clamp(20px,2.4vw,30px)/1 "Pretendard Variable",sans-serif; color: #fff; position: relative; }
    .lm-name::after { content: ""; position: absolute; left: 0; right: 0; bottom: -6px; height: 2px; background: #c9a86a; transform: scaleX(0); transform-origin: left; transition: transform 200ms ease; }
    .lm-item.is-on .lm-name::after { transform: scaleX(1); }
    .lm-media { position: relative; aspect-ratio: 4/3; }
    .lm-card { position: absolute; inset: 0; border: 1px solid rgba(255,255,255,0.14); border-radius: 18px; background: rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: flex-end; padding: 28px; opacity: 0; transition: opacity 200ms ease; }
    .lm-card.is-on { opacity: 1; }
    .lm-card .iw-tag { --accent: #c9a86a; color: #c9a86a; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">06-C · 호버 포커스 풀밴드</span>
  </div>
  <div class="demo-hint">HOVER</div>
  <div class="demo-progress"><div></div></div>

  <main class="stage">
    <section class="lm-wrap">
      <div class="lm-bg lm-bg0 is-on"></div>
      <div class="lm-bg lm-bg1"></div>
      <div class="lm-bg lm-bg2"></div>
      <div class="lm-bg lm-bg3"></div>
      <div class="lm-inner">
        <ul class="lm-list">
          <li class="lm-item is-on" data-i="0"><span class="lm-num">01</span><span class="lm-name">선재 성장</span></li>
          <li class="lm-item" data-i="1"><span class="lm-num">02</span><span class="lm-name">선재 배당</span></li>
          <li class="lm-item" data-i="2"><span class="lm-num">03</span><span class="lm-name">선재 글로벌</span></li>
          <li class="lm-item" data-i="3"><span class="lm-num">04</span><span class="lm-name">선재 연금</span></li>
        </ul>
        <div class="lm-media">
          <div class="lm-card lm-card0 is-on"><span class="iw-tag">EQUITY</span><h3 class="iw-sub">국내 성장주 중심</h3></div>
          <div class="lm-card lm-card1"><span class="iw-tag">DIVIDEND</span><h3 class="iw-sub">안정 배당 포트폴리오</h3></div>
          <div class="lm-card lm-card2"><span class="iw-tag">GLOBAL</span><h3 class="iw-sub">선진국 분산 투자</h3></div>
          <div class="lm-card lm-card3"><span class="iw-tag">PENSION</span><h3 class="iw-sub">장기 연금 설계</h3></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function(){
      var stage = document.querySelector(".stage");
      var progressFill = document.querySelector(".demo-progress > div");
      var items = stage.querySelectorAll(".lm-item");
      var bgs = stage.querySelectorAll(".lm-bg");
      var cards = stage.querySelectorAll(".lm-card");
      function focus(n){
        for (var i = 0; i < items.length; i++){
          items[i].classList.toggle("is-on", i === n);
          bgs[i].classList.toggle("is-on", i === n);
          cards[i].classList.toggle("is-on", i === n);
        }
        if (progressFill) progressFill.style.width = ((n + 1) / items.length * 100) + "%";
      }
      for (var i = 0; i < items.length; i++){
        (function(k){
          items[k].addEventListener("mouseenter", function(){ focus(k); });
          items[k].addEventListener("click", function(){ focus(k); });
        })(i);
      }
      focus(0);
      window.__reset = function(){ focus(0); };
    })();
  </script>
</body>
</html>
