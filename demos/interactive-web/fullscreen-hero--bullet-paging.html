<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01-C. 풀스크린 히어로 오프닝 — 클릭 페이징 크로스페이드</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.72); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; }
    .demo-reset:hover { color: #fff; background: rgba(255,255,255,0.14); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.45); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.06); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .stage { min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .iw-eyebrow { font: 600 12px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent,#8ab4ff); margin: 0; }
    .iw-head { font: 800 clamp(28px,4.4vw,56px)/1.12 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: -0.02em; color: #fff; margin: 0; }
    .iw-sub { font: 700 clamp(20px,2.6vw,30px)/1.3 "Pretendard Variable","Pretendard",sans-serif; color: #fff; margin: 0; }
    .iw-body { font: 400 clamp(14px,1.4vw,17px)/1.7 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.62); margin: 0; }
    .iw-cta { display: inline-flex; align-items: center; gap: 8px; font: 600 13px/1 "Pretendard Variable","Pretendard",sans-serif; color: #fff; border: 1px solid rgba(255,255,255,0.32); border-radius: 999px; padding: 14px 24px; text-decoration: none; }
    .iw-tag { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .hero-c { position: absolute; inset: 0; }
    .demo-progress { display: none; }
    .hc-slides { position: absolute; inset: 0; }
    .hc-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 200ms ease; display: flex; align-items: center; justify-content: center; }
    .hc-slide.is-on { opacity: 1; }
    .hc-bg { position: absolute; inset: 0; }
    .hc-bg0 { background: radial-gradient(120% 120% at 28% 22%, #3c1d1d 0%, #140a0a 60%, #000 100%); }
    .hc-bg1 { background: radial-gradient(120% 120% at 72% 28%, #2c1d3e 0%, #0d0a16 60%, #000 100%); }
    .hc-bg2 { background: radial-gradient(120% 120% at 50% 82%, #1d2c3e 0%, #0a0f16 60%, #000 100%); }
    .hc-tx { position: relative; z-index: 2; text-align: center; max-width: 700px; padding: 0 32px; opacity: 0; transform: translateY(16px); transition: opacity 240ms ease 60ms, transform 240ms ease 60ms; }
    .hc-slide.is-on .hc-tx { opacity: 1; transform: none; }
    .hc-tx .iw-head { margin: 18px 0 0; }
    .hc-tx .iw-body { margin-top: 18px; }
    .hero-c .iw-eyebrow { --accent: #ffd23f; }
    .hc-bullets { position: absolute; left: 0; right: 0; bottom: 42px; display: flex; gap: 12px; justify-content: center; z-index: 5; }
    .hc-bullet { width: 56px; height: 5px; padding: 0; border: none; background: rgba(255,255,255,0.22); border-radius: 999px; cursor: pointer; overflow: hidden; }
    .hc-bullet span { display: block; height: 100%; width: 100%; background: #ffd23f; transform: scaleX(0); transform-origin: left; transition: transform 220ms ease; }
    .hc-bullet.is-on span { transform: scaleX(1); }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">01-C · 풀스크린 히어로 오프닝</span>
  </div>
  <div class="demo-hint">CLICK</div>
  <div class="demo-progress"><div></div></div>

  <main class="stage">
    <section class="hero-c">
      <div class="hc-slides">
        <article class="hc-slide is-on" data-i="0"><div class="hc-bg hc-bg0"></div><div class="hc-tx"><p class="iw-eyebrow">HUMAN LIGHT</p><h1 class="iw-head">모두의 인권을 지키는 일에<br>함께해 주세요</h1><p class="iw-body">당신의 작은 행동이 누군가의 내일을 바꿉니다.</p></div></article>
        <article class="hc-slide" data-i="1"><div class="hc-bg hc-bg1"></div><div class="hc-tx"><p class="iw-eyebrow">URGENT ACTION</p><h1 class="iw-head">위기의 현장에<br>가장 먼저 닿습니다</h1><p class="iw-body">전 세계 인권 침해 현장의 목소리를 가장 가까이에서 전합니다.</p></div></article>
        <article class="hc-slide" data-i="2"><div class="hc-bg hc-bg2"></div><div class="hc-tx"><p class="iw-eyebrow">JOIN US</p><h1 class="iw-head">변화는<br>함께일 때 시작됩니다</h1><p class="iw-body">월 정기후원으로 지속가능한 변화를 함께 만듭니다.</p></div></article>
      </div>
      <div class="hc-bullets">
        <button class="hc-bullet is-on" data-i="0" aria-label="1번 배너로 이동"><span></span></button>
        <button class="hc-bullet" data-i="1" aria-label="2번 배너로 이동"><span></span></button>
        <button class="hc-bullet" data-i="2" aria-label="3번 배너로 이동"><span></span></button>
      </div>
    </section>
  </main>

  <script>
    (function(){
      var stage = document.querySelector(".stage");
      var progressFill = document.querySelector(".demo-progress > div");
      var slides = stage.querySelectorAll(".hc-slide");
      var bullets = stage.querySelectorAll(".hc-bullet");
      function go(n){
        for (var i = 0; i < slides.length; i++){
          slides[i].classList.toggle("is-on", i === n);
          bullets[i].classList.toggle("is-on", i === n);
        }
      }
      for (var b = 0; b < bullets.length; b++){
        (function(i){ bullets[i].addEventListener("click", function(){ go(i); }); })(b);
      }
      window.__reset = function(){ go(0); };
    })();
  </script>
</body>
</html>
