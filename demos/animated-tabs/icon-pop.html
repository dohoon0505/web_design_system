<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07. 아이콘 팝 탭 — Animated Tabs Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; color: inherit; }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 100;
    }
    .demo-reset {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-reset:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
      z-index: 100;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 8px 14px;
      animation: hint-pulse 2.4s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.6; transform: translateY(0); }
      50%       { opacity: 1; transform: translateY(-3px); }
    }
    /* 공통 탭 스테이지 */
    .stage {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 64px 24px 48px;
    }
    .tablist { position: relative; display: inline-flex; align-items: center; }
    .tab {
      position: relative; z-index: 1; appearance: none; border: 0; background: transparent;
      cursor: pointer; font: 600 14px/1 "Pretendard Variable","Pretendard",sans-serif;
      color: rgba(255,255,255,0.55); padding: 10px 18px; border-radius: 999px;
      transition: color 0.18s ease; -webkit-tap-highlight-color: transparent;
    }
    .tab:hover { color: rgba(255,255,255,0.85); }
    .tab[aria-selected="true"] { color: #fff; }
    .panels { position: relative; width: min(520px, 88vw); }
    .panel {
      background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px; padding: 22px;
    }
    .panel[hidden] { display: none; }
    .panel-art { height: 110px; border-radius: 10px; margin: 0 0 16px; }
    .panel-title { margin: 0 0 8px; font: 700 17px/1.35 "Pretendard Variable","Pretendard",sans-serif; color: #fff; letter-spacing: -0.01em; }
    .panel-body { margin: 0; font: 400 14px/1.7 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.62); }
    
    /* 패턴별 CSS */
    .tablist { gap: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 8px; }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 12px; font-size: 12px; }
    .ico { display: inline-flex; color: rgba(255,255,255,0.45); transition: color 200ms ease; }
    .ico svg { display: block; }
    .tab:hover .ico { color: rgba(255,255,255,0.75); }
    .tab[aria-selected="true"] { background: rgba(255,255,255,0.07); }
    .tab[aria-selected="true"] .ico { color: #a5b4fc; animation: ico-pop 320ms cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes ico-pop { 0% { transform: scale(0.6); } 60% { transform: scale(1.12); } 100% { transform: scale(1); } }
    .panel-in { animation: panel-in 220ms cubic-bezier(0.4,0,0.2,1) both; }
    @keyframes panel-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">07 · 아이콘 팝 탭</span>
  </div>
  <div class="demo-hint">탭을 클릭해보세요</div>

  <main class="stage">
    <div class="tablist" role="tablist" aria-label="워크플로 탭">
        <button class="tab" id="tab-0" role="tab" aria-selected="true" aria-controls="panel-0"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg></span><span class="lbl">디자인</span></button>
        <button class="tab" id="tab-1" role="tab" aria-selected="false" aria-controls="panel-1"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span><span class="lbl">개발</span></button>
        <button class="tab" id="tab-2" role="tab" aria-selected="false" aria-controls="panel-2"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span><span class="lbl">배포</span></button>
        <button class="tab" id="tab-3" role="tab" aria-selected="false" aria-controls="panel-3"><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></span><span class="lbl">분석</span></button>
      </div>
      <div class="panels">
        <div class="panel" id="panel-0" role="tabpanel" aria-labelledby="tab-0">
          <div class="panel-art" style="background:linear-gradient(135deg,#6366f1 0%,#a855f7 100%)"></div>
          <h2 class="panel-title">01 디자인</h2>
          <p class="panel-body">컴포넌트 라이브러리에서 블록을 끌어다 화면을 조립합니다. 디자인 토큰은 코드와 자동 동기화됩니다.</p>
        </div>
        <div class="panel" id="panel-1" role="tabpanel" aria-labelledby="tab-1" hidden>
          <div class="panel-art" style="background:linear-gradient(135deg,#06b6d4 0%,#3b82f6 100%)"></div>
          <h2 class="panel-title">02 개발</h2>
          <p class="panel-body">디자인이 곧 코드입니다. 변경 사항은 풀 리퀘스트로 만들어져 리뷰 후 머지됩니다.</p>
        </div>
        <div class="panel" id="panel-2" role="tabpanel" aria-labelledby="tab-2" hidden>
          <div class="panel-art" style="background:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%)"></div>
          <h2 class="panel-title">03 배포</h2>
          <p class="panel-body">머지하면 프리뷰 환경에 즉시 배포됩니다. 롤백은 클릭 한 번으로 끝납니다.</p>
        </div>
        <div class="panel" id="panel-3" role="tabpanel" aria-labelledby="tab-3" hidden>
          <div class="panel-art" style="background:linear-gradient(135deg,#10b981 0%,#14b8a6 100%)"></div>
          <h2 class="panel-title">04 분석</h2>
          <p class="panel-body">배포 후 전환율과 성능 지표를 자동 수집합니다. 이상 징후는 슬랙으로 바로 알려드립니다.</p>
        </div>
      </div>
  </main>

  <script>
    (function(){
      // 패턴별 JS — update(i, prev) 정의 + 인디케이터 헬퍼 (코어보다 먼저: var 초기화 순서)
      function update(i, prev){ swapPanel(i); }
      function swapPanel(i){
        panels.forEach(function(pn, j){ pn.hidden = j !== i; pn.classList.remove("panel-in"); });
        void panels[i].offsetWidth;
        panels[i].classList.add("panel-in");
      }
      // 공통 코어 — select / 키보드 / resize 재측정 / __reset(첫 탭) / select(0)
      var tabs = [].slice.call(document.querySelectorAll(".tab"));
      var panels = [].slice.call(document.querySelectorAll(".panel"));
      var current = 0;
      function showPanel(i){ panels.forEach(function(pn, j){ pn.hidden = j !== i; }); }
      function select(i){
        var prev = current; current = i;
        tabs.forEach(function(t, j){ t.setAttribute("aria-selected", j === i ? "true" : "false"); });
        update(i, prev);
      }
      tabs.forEach(function(t, i){ t.addEventListener("click", function(){ select(i); }); });
      document.querySelector(".tablist").addEventListener("keydown", function(e){
        var dir = (e.key === "ArrowRight" || e.key === "ArrowDown") ? 1 : ((e.key === "ArrowLeft" || e.key === "ArrowUp") ? -1 : 0);
        if (!dir) return;
        e.preventDefault();
        var n = (current + dir + tabs.length) % tabs.length;
        select(n); tabs[n].focus();
      });
      window.addEventListener("resize", function(){ update(current, current); });
      window.__reset = function(){ select(0); };
      select(0);
    })();
  </script>
</body>
</html>
