<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06. 지도 경로 — Scroll Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 20;
    }
    .demo-reset {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-reset:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      z-index: 20;
      animation: demo-hint-bounce 1.6s ease-in-out infinite;
    }
    @keyframes demo-hint-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50%       { transform: translateY(4px); opacity: 0.8; }
    }
    .demo-progress {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.06);
      z-index: 20;
    }
    .demo-progress > div {
      height: 100%; background: #fff; width: 0;
      transition: width 60ms linear;
    }
    .scroll-track { min-height: 240vh; position: relative; }
    .sticky-stage {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 8vw 60px;
      overflow: hidden;
    }
    /* 패턴별 CSS */
    .map-svg { width: min(760px, 90vw); height: auto; display: block; }
    .map-grid { stroke: rgba(255,255,255,0.07); stroke-width: 1; }
    .route-bg { stroke: rgba(255,255,255,0.16); stroke-width: 2; stroke-dasharray: 3 8; stroke-linecap: round; }
    .route-path { stroke: #fff; stroke-width: 3.5; stroke-linecap: round; }
    .map-start-dot { fill: rgba(255,255,255,0.9); }
    .map-label { font: 600 15px "Pretendard Variable","Pretendard",system-ui,sans-serif; fill: rgba(255,255,255,0.6); text-anchor: middle; }
    .route-halo { fill: rgba(255,255,255,0.15); }
    .route-dot { fill: #fff; }
    .route-pin { opacity: 0; }
    .route-pin path { fill: #fff; }
    .route-pin circle { fill: #000; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">06 · 지도 경로</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <svg class="map-svg" viewBox="0 0 760 420" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="map-grid" d="M 0 105 H 760 M 0 210 H 760 M 0 315 H 760 M 152 0 V 420 M 304 0 V 420 M 456 0 V 420 M 608 0 V 420"/>
        <path class="route-bg" d="M 90 340 C 150 300 160 240 230 230 C 310 220 330 290 410 280 C 490 270 480 180 540 150 C 580 130 620 130 660 96"/>
        <path class="route-path" d="M 90 340 C 150 300 160 240 230 230 C 310 220 330 290 410 280 C 490 270 480 180 540 150 C 580 130 620 130 660 96"/>
        <circle class="map-start-dot" cx="90" cy="340" r="8"/>
        <text class="map-label" x="90" y="375">출발</text>
        <g class="route-marker">
          <circle class="route-halo" r="14"/>
          <circle class="route-dot" r="7"/>
        </g>
        <g class="route-pin">
          <path d="M 0 0 C -12 -16 -19 -27 -19 -38 C -19 -51 -10 -60 0 -60 C 10 -60 19 -51 19 -38 C 19 -27 12 -16 0 0 Z"/>
          <circle cy="-38" r="7"/>
        </g>
        <text class="map-label" x="660" y="130">도착</text>
      </svg>
    </div>
  </div>

  <script>
    (function(){
      var track = document.querySelector(".scroll-track");
      var progressFill = document.querySelector(".demo-progress > div");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }

      // 패턴별 init + applyReveal 정의
      var route = document.querySelector(".route-path");
      var marker = document.querySelector(".route-marker");
      var pin = document.querySelector(".route-pin");
      var L = route.getTotalLength();
      route.style.strokeDasharray = L + " " + L;
      route.style.strokeDashoffset = L;
      function clamp01(x){ return Math.max(0, Math.min(1, x)); }
      function applyReveal(p){
        var t = clamp01((p - 0.05) / 0.78);
        route.style.strokeDashoffset = L * (1 - t);
        var pt = route.getPointAtLength(L * t);
        marker.setAttribute("transform", "translate(" + pt.x.toFixed(1) + " " + pt.y.toFixed(1) + ")");
        var pinP = clamp01((p - 0.86) / 0.12);
        pin.style.opacity = pinP;
        pin.setAttribute("transform", "translate(660 96) scale(" + (0.5 + 0.5 * pinP).toFixed(3) + ")");
      }

      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
