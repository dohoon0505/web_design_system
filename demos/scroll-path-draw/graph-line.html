<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>08. 그래프 라인 — Scroll Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 20;
    }
    .demo-reset {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-reset:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      z-index: 20;
      animation: demo-hint-bounce 1.6s ease-in-out infinite;
    }
    @keyframes demo-hint-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50%       { transform: translateY(4px); opacity: 0.8; }
    }
    .demo-progress {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.06);
      z-index: 20;
    }
    .demo-progress > div {
      height: 100%; background: #fff; width: 0;
      transition: width 60ms linear;
    }
    .scroll-track { min-height: 240vh; position: relative; }
    .sticky-stage {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 8vw 60px;
      overflow: hidden;
    }
    /* 패턴별 CSS */
    .graph-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .graph-svg { width: min(720px, 90vw); height: auto; display: block; }
    .graph-grid line { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .graph-area { fill: rgba(255,255,255,0.12); opacity: 0; }
    .graph-line { stroke: #fff; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .graph-dots circle { fill: #000; stroke: #fff; stroke-width: 3; opacity: 0; }
    .graph-x text { font: 500 13px "Pretendard Variable","Pretendard",system-ui,sans-serif; fill: rgba(255,255,255,0.45); text-anchor: middle; }
    .graph-caption { font: 500 15px/1.6 "Pretendard Variable","Pretendard",system-ui,sans-serif; color: rgba(255,255,255,0.45); margin: 0; letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">08 · 그래프 라인</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <div class="graph-wrap">
        <svg class="graph-svg" viewBox="0 0 720 380" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="graph-grid">
            <line x1="60" y1="80" x2="660" y2="80"/>
            <line x1="60" y1="155" x2="660" y2="155"/>
            <line x1="60" y1="230" x2="660" y2="230"/>
            <line x1="60" y1="305" x2="660" y2="305"/>
          </g>
          <path class="graph-area" d="M 60 300 L 180 220 L 300 250 L 420 150 L 540 180 L 660 80 L 660 330 L 60 330 Z"/>
          <path class="graph-line" d="M 60 300 L 180 220 L 300 250 L 420 150 L 540 180 L 660 80"/>
          <g class="graph-dots">
            <circle cx="60" cy="300" r="6"/>
            <circle cx="180" cy="220" r="6"/>
            <circle cx="300" cy="250" r="6"/>
            <circle cx="420" cy="150" r="6"/>
            <circle cx="540" cy="180" r="6"/>
            <circle cx="660" cy="80" r="6"/>
          </g>
          <g class="graph-x">
            <text x="60" y="356">1월</text>
            <text x="180" y="356">2월</text>
            <text x="300" y="356">3월</text>
            <text x="420" y="356">4월</text>
            <text x="540" y="356">5월</text>
            <text x="660" y="356">6월</text>
          </g>
        </svg>
        <p class="graph-caption">월간 활성 사용자 추이</p>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var track = document.querySelector(".scroll-track");
      var progressFill = document.querySelector(".demo-progress > div");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }

      // 패턴별 init + applyReveal 정의
      var line = document.querySelector(".graph-line");
      var area = document.querySelector(".graph-area");
      var dots = document.querySelectorAll(".graph-dots circle");
      var L = line.getTotalLength();
      line.style.strokeDasharray = L + " " + L;
      line.style.strokeDashoffset = L;
      var pts = [[60,300],[180,220],[300,250],[420,150],[540,180],[660,80]];
      var cum = [0];
      for (var i = 1; i < pts.length; i++) {
        var dx = pts[i][0] - pts[i-1][0];
        var dy = pts[i][1] - pts[i-1][1];
        cum.push(cum[i-1] + Math.sqrt(dx*dx + dy*dy));
      }
      var totalLen = cum[cum.length - 1];
      function clamp01(x){ return Math.max(0, Math.min(1, x)); }
      function applyReveal(p){
        var drawP = clamp01((p - 0.05) / 0.55);
        line.style.strokeDashoffset = L * (1 - drawP);
        dots.forEach(function(dot, i){
          dot.style.opacity = clamp01((drawP - cum[i] / totalLen) / 0.06);
        });
        area.style.opacity = clamp01((p - 0.66) / 0.2);
      }

      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
