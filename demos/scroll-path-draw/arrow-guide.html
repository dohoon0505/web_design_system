<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10. 화살표 가이드 — Scroll Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 20;
    }
    .demo-reset {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-reset:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      z-index: 20;
      animation: demo-hint-bounce 1.6s ease-in-out infinite;
    }
    @keyframes demo-hint-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50%       { transform: translateY(4px); opacity: 0.8; }
    }
    .demo-progress {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.06);
      z-index: 20;
    }
    .demo-progress > div {
      height: 100%; background: #fff; width: 0;
      transition: width 60ms linear;
    }
    .scroll-track { min-height: 240vh; position: relative; }
    .sticky-stage {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 8vw 60px;
      overflow: hidden;
    }
    /* 패턴별 CSS */
    .guide-wrap { position: relative; width: min(760px, 90vw); aspect-ratio: 760 / 400; }
    .guide-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .guide-arrow { stroke: #fff; stroke-width: 3.5; stroke-linecap: round; }
    .guide-head { stroke: #fff; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0; }
    .guide-card { position: absolute; display: flex; flex-direction: column; gap: 6px; padding: 18px 22px; border: 1px solid rgba(255,255,255,0.18); border-radius: 14px; background: rgba(255,255,255,0.04); }
    .guide-card strong { font: 700 24px/1.2 "Pretendard Variable","Pretendard",system-ui,sans-serif; color: #fff; }
    .guide-step { font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace; color: rgba(255,255,255,0.4); letter-spacing: 0.14em; }
    .guide-desc { font: 500 14px/1.5 "Pretendard Variable","Pretendard",system-ui,sans-serif; color: rgba(255,255,255,0.55); }
    .guide-card-a { left: 2%; top: 6%; }
    .guide-card-b { right: 2%; bottom: 6%; opacity: 0.25; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">10 · 화살표 가이드</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <div class="guide-wrap">
        <svg class="guide-svg" viewBox="0 0 760 400" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
          <path class="guide-arrow" d="M 215 92 C 380 50 280 230 420 282 C 470 300 510 298 538 290"/>
          <path class="guide-head" d="M 520 272 L 548 292 L 518 306"/>
        </svg>
        <div class="guide-card guide-card-a">
          <span class="guide-step">STEP 1</span>
          <strong>아이디어</strong>
          <span class="guide-desc">스케치에서 시작합니다</span>
        </div>
        <div class="guide-card guide-card-b">
          <span class="guide-step">STEP 2</span>
          <strong>런칭</strong>
          <span class="guide-desc">화살표가 닿으면 완성</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var track = document.querySelector(".scroll-track");
      var progressFill = document.querySelector(".demo-progress > div");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }

      // 패턴별 init + applyReveal 정의
      var arrow = document.querySelector(".guide-arrow");
      var head = document.querySelector(".guide-head");
      var cardB = document.querySelector(".guide-card-b");
      var L = arrow.getTotalLength();
      arrow.style.strokeDasharray = L + " " + L;
      arrow.style.strokeDashoffset = L;
      function clamp01(x){ return Math.max(0, Math.min(1, x)); }
      function applyReveal(p){
        var t = clamp01((p - 0.08) / 0.72);
        arrow.style.strokeDashoffset = L * (1 - t);
        var headP = clamp01((p - 0.8) / 0.1);
        head.style.opacity = headP;
        var bP = clamp01((p - 0.84) / 0.14);
        cardB.style.opacity = 0.25 + 0.75 * bP;
      }

      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
