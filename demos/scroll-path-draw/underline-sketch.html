<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03. 밑줄 스케치 — Scroll Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 20;
    }
    .demo-reset {
      font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 14px; cursor: pointer;
      transition: color 160ms, background 160ms, border-color 160ms;
    }
    .demo-reset:hover {
      color: #fff; background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.32);
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      z-index: 20;
      animation: demo-hint-bounce 1.6s ease-in-out infinite;
    }
    @keyframes demo-hint-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.45; }
      50%       { transform: translateY(4px); opacity: 0.8; }
    }
    .demo-progress {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.06);
      z-index: 20;
    }
    .demo-progress > div {
      height: 100%; background: #fff; width: 0;
      transition: width 60ms linear;
    }
    .scroll-track { min-height: 240vh; position: relative; }
    .sticky-stage {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 8vw 60px;
      overflow: hidden;
    }
    /* 패턴별 CSS */
    .sketch-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .sketch-head { font: 700 clamp(32px, 6vw, 52px)/1.3 "Pretendard Variable","Pretendard",system-ui,sans-serif; color: #fff; margin: 0; opacity: 0; letter-spacing: -0.02em; text-align: center; }
    .sketch-svg { width: min(560px, 80vw); height: auto; display: block; }
    .sketch-line { stroke: #fff; stroke-width: 5; stroke-linecap: round; }
    .sketch-line2 { stroke: rgba(255,255,255,0.55); stroke-width: 3; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">03 · 밑줄 스케치</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
      <div class="sketch-wrap">
        <h2 class="sketch-head">디테일이 완성도를 만듭니다</h2>
        <svg class="sketch-svg" viewBox="0 0 560 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path class="sketch-line sketch-line1" d="M 10 22 C 90 10 170 32 270 18 C 360 6 460 28 550 16"/>
          <path class="sketch-line sketch-line2" d="M 16 32 C 110 22 210 40 320 26 C 410 16 480 30 544 26"/>
        </svg>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var track = document.querySelector(".scroll-track");
      var progressFill = document.querySelector(".demo-progress > div");
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }

      // 패턴별 init + applyReveal 정의
      var head = document.querySelector(".sketch-head");
      var line1 = document.querySelector(".sketch-line1");
      var line2 = document.querySelector(".sketch-line2");
      var L1 = line1.getTotalLength();
      var L2 = line2.getTotalLength();
      line1.style.strokeDasharray = L1 + " " + L1;
      line1.style.strokeDashoffset = L1;
      line2.style.strokeDasharray = L2 + " " + L2;
      line2.style.strokeDashoffset = L2;
      function clamp01(x){ return Math.max(0, Math.min(1, x)); }
      function applyReveal(p){
        var headP = clamp01((p - 0.04) / 0.24);
        head.style.opacity = headP;
        head.style.transform = "translateY(" + (18 * (1 - headP)) + "px)";
        var d1 = clamp01((p - 0.3) / 0.34);
        line1.style.strokeDashoffset = L1 * (1 - d1);
        var d2 = clamp01((p - 0.6) / 0.32);
        line2.style.strokeDashoffset = L2 * (1 - d2);
      }

      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
