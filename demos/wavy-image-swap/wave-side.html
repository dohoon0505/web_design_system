<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02. 측면 물결 스윕 — Wavy Image Swap Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: "Pretendard Variable","Pretendard",sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .demo-controls { position: fixed; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 10px; z-index: 100; }
    .demo-reset { font: 600 11px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.18); border-radius: 999px; padding: 8px 14px; cursor: pointer; transition: color 160ms, background 160ms; backdrop-filter: blur(8px); }
    .demo-reset:hover { color: #fff; background: rgba(0,0,0,0.7); }
    .demo-label { font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.55); letter-spacing: 0.14em; text-transform: uppercase; }
    .demo-hint { position: fixed; right: 16px; bottom: 24px; font: 500 10px/1 "Pretendard Variable","Pretendard",sans-serif; color: rgba(255,255,255,0.6); letter-spacing: 0.18em; text-transform: uppercase; z-index: 100; background: rgba(0,0,0,0.4); padding: 8px 14px; border-radius: 999px; backdrop-filter: blur(8px); animation: hint-bounce 1.6s ease-in-out infinite; }
    @keyframes hint-bounce { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(4px); opacity: 1; } }
    .demo-progress { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.12); z-index: 100; }
    .demo-progress > div { height: 100%; background: #fff; width: 0; transition: width 60ms linear; }
    .scroll-track { min-height: 500vh; position: relative; }
    .sticky-stage { position: sticky; top: 0; height: 100vh; overflow: hidden; background: #000; }
    .wis-card { position: absolute; inset: 0; will-change: clip-path; }
    .wis-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .wis-cap { position: absolute; left: 32px; bottom: 40px; color: #fff; font: 600 clamp(14px,1.3vw,18px)/1 "Pretendard Variable","Pretendard",sans-serif; letter-spacing: 0.02em; text-shadow: 0 2px 12px rgba(0,0,0,0.5); padding: 8px 0; }
    
  </style>
</head>
<body>
  <div class="demo-controls">
    <button class="demo-reset" type="button" onclick="window.__reset && window.__reset()">↻ 다시 보기</button>
    <span class="demo-label">02 · 측면 물결 스윕</span>
  </div>
  <div class="demo-hint">SCROLL ↓</div>
  <div class="demo-progress"><div></div></div>

  <div class="scroll-track">
    <div class="sticky-stage">
        <div class="wis-card" data-i="0">
          <img class="wis-img" src="https://picsum.photos/seed/wave-coast/1600/1000" alt="">
          <span class="wis-cap">01 · 해안의 아침</span>
        </div>
        <div class="wis-card" data-i="1">
          <img class="wis-img" src="https://picsum.photos/seed/wave-arch/1600/1000" alt="">
          <span class="wis-cap">02 · 물결 위의 건축</span>
        </div>
        <div class="wis-card" data-i="2">
          <img class="wis-img" src="https://picsum.photos/seed/wave-dune/1600/1000" alt="">
          <span class="wis-cap">03 · 사구와 들꽃</span>
        </div>
        <div class="wis-card" data-i="3">
          <img class="wis-img" src="https://picsum.photos/seed/wave-dusk/1600/1000" alt="">
          <span class="wis-cap">04 · 황혼의 바다</span>
        </div>
        <div class="wis-card" data-i="4">
          <img class="wis-img" src="https://picsum.photos/seed/wave-calm/1600/1000" alt="">
          <span class="wis-cap">05 · 미니멀 풍경</span>
        </div>
    </div>
  </div>

  <script>
    (function(){
      var progressFill = document.querySelector(".demo-progress > div");
      var track = document.querySelector(".scroll-track");
      var cards = document.querySelectorAll(".wis-card");
      var N = 5;
      var ZERO = "polygon(0px 0px,0px 0px,0px 0px)";
      function polyUp(c,w,h,amp,waves,zig){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var A=amp, base=(1-c)*(h+2*A)-A, s=28, pts=[];
        for(var i=0;i<=s;i++){
          var x=w*i/s, ph=i/s*waves*Math.PI*2, sn=Math.sin(ph);
          var v=zig?(2/Math.PI)*Math.asin(sn):sn;
          pts.push(x.toFixed(1)+"px "+(base+A*v).toFixed(1)+"px");
        }
        pts.push(w+"px "+h+"px"); pts.push("0px "+h+"px");
        return "polygon("+pts.join(",")+")";
      }
      function polySide(c,w,h,amp,waves){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var A=amp, ex=c*(w+2*A)-A, s=28, pts=[];
        for(var i=0;i<=s;i++){
          var y=h*i/s, ph=i/s*waves*Math.PI*2;
          pts.push((ex+A*Math.sin(ph)).toFixed(1)+"px "+y.toFixed(1)+"px");
        }
        pts.push("0px "+h+"px"); pts.push("0px 0px");
        return "polygon("+pts.join(",")+")";
      }
      function polyDiag(c,w,h,amp,waves){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var A=amp, s=28, pts=[];
        for(var i=0;i<=s;i++){
          var y=h*i/s, ph=i/s*waves*Math.PI*2;
          var x=w*(2*c - y/h)+A*Math.sin(ph);
          pts.push(x.toFixed(1)+"px "+y.toFixed(1)+"px");
        }
        pts.push("0px "+h+"px"); pts.push("0px 0px");
        return "polygon("+pts.join(",")+")";
      }
      function polyBlob(c,w,h,lobes,af){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var cx=w/2, cy=h/2, maxR=Math.hypot(w,h)/2*1.15, R=c*maxR, s=56, pts=[];
        for(var i=0;i<=s;i++){
          var a=i/s*Math.PI*2, r=R*(1+af*Math.sin(a*lobes));
          pts.push((cx+r*Math.cos(a)).toFixed(1)+"px "+(cy+r*Math.sin(a)).toFixed(1)+"px");
        }
        return "polygon("+pts.join(",")+")";
      }
      function polyBand(c,w,h,amp,waves){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var A=amp, cy=h/2, half=c*(h/2+A), s=24, pts=[];
        for(var i=0;i<=s;i++){ var x=w*i/s, ph=i/s*waves*Math.PI*2; pts.push(x.toFixed(1)+"px "+(cy-half+A*Math.sin(ph)).toFixed(1)+"px"); }
        for(var i=s;i>=0;i--){ var x=w*i/s, ph=i/s*waves*Math.PI*2; pts.push(x.toFixed(1)+"px "+(cy+half+A*Math.sin(ph)).toFixed(1)+"px"); }
        return "polygon("+pts.join(",")+")";
      }
      function polyCurtain(c,w,h,amp,waves){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var A=amp, cx=w/2, half=c*(w/2+A), s=24, pts=[];
        for(var i=0;i<=s;i++){ var y=h*i/s, ph=i/s*waves*Math.PI*2; pts.push((cx-half+A*Math.sin(ph)).toFixed(1)+"px "+y.toFixed(1)+"px"); }
        for(var i=s;i>=0;i--){ var y=h*i/s, ph=i/s*waves*Math.PI*2; pts.push((cx+half+A*Math.sin(ph)).toFixed(1)+"px "+y.toFixed(1)+"px"); }
        return "polygon("+pts.join(",")+")";
      }
      function polyStack(c,w,h){
        if(c<=0) return ZERO; if(c>=1) return "inset(0)";
        var A=50, base=(1-c)*(h+2*A)-A, s=32, pts=[];
        for(var i=0;i<=s;i++){
          var x=w*i/s, ph=i/s*Math.PI*2, y=base+28*Math.sin(ph)+15*Math.sin(ph*2.5+1);
          pts.push(x.toFixed(1)+"px "+y.toFixed(1)+"px");
        }
        pts.push(w+"px "+h+"px"); pts.push("0px "+h+"px");
        return "polygon("+pts.join(",")+")";
      }
      function clipFor(c, w, h){ return polySide(c,w,h,42,2.5); }
      function calc(){
        var rect = track.getBoundingClientRect();
        var max = Math.max(1, rect.height - window.innerHeight);
        return Math.max(0, Math.min(1, -rect.top / max));
      }
      function applyReveal(p){
        var w = window.innerWidth, h = window.innerHeight, segs = N - 1;
        var fp = p * segs, idx = Math.min(Math.floor(fp), segs - 1), local = fp - idx;
        for (var i = 0; i < cards.length; i++){
          var cov = i === 0 ? 1 : i <= idx ? 1 : i === idx + 1 ? local : 0;
          cards[i].style.zIndex = i;
          cards[i].style.clipPath = clipFor(cov, w, h);
        }
      }
      function tick(){
        var p = calc();
        progressFill.style.width = (p * 100) + "%";
        applyReveal(p);
      }
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick, { passive: true });
      window.__reset = function(){ window.scrollTo({ top: 0, behavior: "smooth" }); };
      tick();
    })();
  </script>
</body>
</html>
