<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01. 메가 메뉴 (Aave 스타일) — Nav Dropdown Demo</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #000; color: #fff;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .demo-controls {
      position: fixed; top: 16px; left: 16px;
      display: inline-flex; align-items: center; gap: 10px;
      z-index: 100;
    }
    .demo-label {
      font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .demo-hint {
      position: fixed; right: 16px; bottom: 24px;
      font: 500 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
      z-index: 100;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 8px 14px;
      animation: hint-pulse 2.4s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.6; transform: translateY(0); }
      50%       { opacity: 1; transform: translateY(-3px); }
    }
    /* 표준 nav bar (sticky 상단) */
    .nav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      gap: 32px;
      padding: 14px 40px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-brand { font: 700 16px/1 inherit; color: #fff; letter-spacing: -0.01em; }
    .nav-menu { list-style: none; margin: 0; padding: 0; display: flex; gap: 8px; }
    .nav-menu > li { position: relative; }
    .nav-menu > li > a, .nav-menu > li > .trigger {
      display: inline-block; padding: 8px 14px;
      font: 500 14px/1.2 inherit; color: rgba(255,255,255,0.78);
      text-decoration: none; border-radius: 8px;
      cursor: pointer; transition: background 160ms, color 160ms;
    }
    .nav-menu > li > a:hover, .nav-menu > li > .trigger:hover,
    .has-dropdown.is-open > .trigger { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-cta {
      font: 600 13px/1 inherit; color: #000; background: #fff;
      border: 0; border-radius: 999px; padding: 9px 18px; cursor: pointer;
      transition: opacity 160ms, transform 160ms;
    }
    .nav-cta:hover { transform: translateY(-1px); }
    /* dropdown 컨테이너 (밝은 톤) */
    .has-dropdown .dropdown {
      position: absolute; top: calc(100% + 12px); left: 50%;
      transform: translate(-50%, -6px);
      background: #fff; color: #171717;
      border-radius: 16px;
      box-shadow: 0 18px 48px -12px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.04);
      opacity: 0; visibility: hidden;
      transition: opacity 200ms cubic-bezier(0.2,0,0,1), transform 200ms cubic-bezier(0.2,0,0,1), visibility 200ms;
      font-family: inherit;
    }
    .has-dropdown.is-open .dropdown {
      opacity: 1; visibility: visible; transform: translate(-50%, 0);
    }
    /* dropdown 안의 a 기본 색 (밝은 톤) */
    .dropdown a { color: #171717; }
    /* 본문 빈 영역 (페이지 placeholder) */
    .page-content {
      min-height: calc(100vh - 70px);
      display: flex; align-items: center; justify-content: center;
      padding: 80px 40px;
      color: rgba(255,255,255,0.18);
      font: 700 56px/1.2 inherit; letter-spacing: -0.02em; text-align: center;
    }
    /* 패턴별 dropdown CSS */
    .dd-mega { display: grid; grid-template-columns: 1.3fr 1fr; gap: 12px; padding: 12px; min-width: 720px; }
    .dd-list { display: flex; flex-direction: column; gap: 2px; }
    .dd-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: 12px; text-decoration: none; color: #171717; transition: background 160ms; cursor: pointer; }
    .dd-item:hover, .dd-item.is-on { background: #f4f4f5; }
    .dd-icon { width: 40px; height: 40px; border-radius: 8px; background: #d4d4d8; flex-shrink: 0; }
    .dd-icon-blue { background: #3b82f6; }
    .dd-meta h4 { font: 600 14px/1.2 inherit; margin: 0 0 3px; }
    .dd-meta p { font: 400 13px/1.4 inherit; margin: 0; color: #71717a; }
    .dd-visual { background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); border-radius: 14px; min-height: 320px; display: flex; align-items: center; justify-content: center; }
    .dd-visual-label { font: 700 13px/1 ui-monospace, monospace; color: rgba(255,255,255,0.55); letter-spacing: 0.18em; }
  </style>
</head>
<body>
  <div class="demo-controls">
    <span class="demo-label">01 · 메가 메뉴 (Aave 스타일)</span>
  </div>
  <div class="demo-hint">↓ &quot;서비스&quot; 메뉴에 호버해보세요</div>

  <nav class="nav">
    <div class="nav-brand">스튜디오</div>
    <ul class="nav-menu">
      <li><a href="#">홈</a></li>
      <li class="has-dropdown">
        <a class="trigger" href="#">서비스</a>
        <div class="dropdown">
          <div class="dd-mega">
            <div class="dd-list">
              <a class="dd-item is-on" data-vid="a"><span class="dd-icon dd-icon-blue"></span><div class="dd-meta"><h4>블로그</h4><p>최신 소식과 업데이트</p></div></a>
              <a class="dd-item" data-vid="b"><span class="dd-icon"></span><div class="dd-meta"><h4>브랜드</h4><p>로고와 사용 가이드라인</p></div></a>
              <a class="dd-item" data-vid="c"><span class="dd-icon"></span><div class="dd-meta"><h4>FAQ</h4><p>자주 묻는 질문에 대한 답</p></div></a>
              <a class="dd-item" data-vid="d"><span class="dd-icon"></span><div class="dd-meta"><h4>도움말</h4><p>가이드와 문서, 그리고 더 많은</p></div></a>
              <a class="dd-item" data-vid="e"><span class="dd-icon"></span><div class="dd-meta"><h4>거버넌스</h4><p>커뮤니티 거버넌스 포럼</p></div></a>
            </div>
            <div class="dd-visual"><span class="dd-visual-label">VISUAL</span></div>
          </div>
        </div>
      </li>
      <li><a href="#">고객사</a></li>
      <li><a href="#">가격</a></li>
    </ul>
    <button class="nav-cta" type="button">시작하기</button>
  </nav>

  <main class="page-content">디자인 스튜디오</main>

  <script>
    (function(){
      var trigger = document.querySelector(".has-dropdown");
      if (!trigger) return;
      var closeTimer = null;
      function open(){ clearTimeout(closeTimer); trigger.classList.add("is-open"); }
      function close(){ closeTimer = setTimeout(function(){ trigger.classList.remove("is-open"); }, 120); }
      trigger.addEventListener("mouseenter", open);
      trigger.addEventListener("mouseleave", close);
      // dropdown 내부 호버 시에도 닫히지 않게
      var dd = trigger.querySelector(".dropdown");
      if (dd) {
        dd.addEventListener("mouseenter", open);
        dd.addEventListener("mouseleave", close);
      }
      // 패턴별 JS
      document.querySelectorAll(".dd-item").forEach(function(el){ el.addEventListener("mouseenter", function(){ document.querySelectorAll(".dd-item").forEach(function(x){ x.classList.remove("is-on"); }); el.classList.add("is-on"); }); el.addEventListener("click", function(e){ e.preventDefault(); }); });
    })();
  </script>
</body>
</html>
