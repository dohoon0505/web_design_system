<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Web Design System — website analysis catalog." />
  <title>Web Design System</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>

  <!-- Topbar -->
  <header class="topbar" id="topbar">
    <div class="topbar-inner">
      <button
        type="button"
        class="icon-button topbar-hamburger"
        id="hamburger"
        aria-label="Toggle navigation"
        aria-controls="sidebar"
        aria-expanded="false"
      >
        <svg class="icon"><use href="#i-menu"></use></svg>
      </button>

      <a class="brand topbar-brand" href="#" data-route="home">
        <span class="brand-mark" aria-hidden="true">WDS</span>
        <span class="brand-text">Web Design System</span>
        <span class="version-badge" id="topbar-version">v0.1.0</span>
      </a>

      <nav class="topbar-nav" id="topbar-nav" aria-label="Primary">
        <!-- Populated dynamically from system.json topbarGroups -->
      </nav>

      <button
        type="button"
        class="icon-button theme-toggle"
        id="theme-toggle-topbar"
        aria-label="Toggle theme"
      >
        <svg class="icon icon-sun"><use href="#i-sun"></use></svg>
        <svg class="icon icon-moon"><use href="#i-moon"></use></svg>
        <span class="theme-toggle-text">
          <span class="theme-text-light">Dark</span>
          <span class="theme-text-dark">Light</span>
        </span>
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Navigation">
    <!-- Sidebar brand header -->
    <a class="sidebar-brand" href="#" data-route="home">
      <span class="brand-mark sidebar-brand-mark" aria-hidden="true">WDS</span>
      <span class="sidebar-brand-text">
        <span class="brand-name">Web Design System</span>
        <span class="brand-ver" id="sidebar-version">v0.1.0 · 2026-05-13</span>
      </span>
      <button
        type="button"
        class="icon-button sidebar-close"
        id="sidebar-close"
        aria-label="Close navigation"
      >
        <svg class="icon"><use href="#i-x"></use></svg>
      </button>
    </a>

    <nav class="sidebar-scroll" id="sidebar-nav" aria-label="Sections">
      <!-- Populated dynamically by main.js from system.json -->
    </nav>

    <!-- Sidebar footer: theme region with label + sub -->
    <div class="sidebar-theme" id="sidebar-theme">
      <div class="sidebar-theme-text">
        <span class="sidebar-theme-label">테마</span>
        <span class="sidebar-theme-sub" id="sidebar-theme-sub">Light Mode</span>
      </div>
      <button
        type="button"
        class="icon-button theme-toggle theme-toggle-sidebar"
        id="theme-toggle-sidebar"
        aria-label="Toggle theme"
      >
        <svg class="icon icon-sun"><use href="#i-sun"></use></svg>
        <svg class="icon icon-moon"><use href="#i-moon"></use></svg>
      </button>
    </div>
  </aside>

  <!-- Mobile overlay scrim -->
  <div class="scrim" id="scrim" hidden></div>

  <!-- Main content -->
  <main class="main" id="main">
    <div class="container" id="top">
      <div class="loading" id="loading">Loading…</div>
    </div>

    <!-- Footer -->
    <footer class="footer" id="footer">
      <div class="footer-summary" id="footer-summary">Web Design System</div>
      <div class="footer-meta" id="footer-meta">MAINTAINED BY · 2026 ©</div>
    </footer>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
