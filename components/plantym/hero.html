<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PlantyM — Hero (실측 1080px Video Background)</title>
<link rel="stylesheet" href="../../plantym-app/styles/globals.css">
<style>
.main-visual {
  position: relative;
  width: 100%;
  height: 1080px;
  overflow: hidden;
  background: #000;
}

.main-visual .bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.main-visual .bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.main-visual::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,.3), rgba(0,0,0,.65));
  z-index: 1;
}

.main-visual .inner {
  position: relative;
  z-index: 2;
  height: 100%;
  max-width: var(--container-large);
  margin: 0 auto;
  padding: 0 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.heading {
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--fs-hero-h1);
  line-height: 1.05;
  color: #fff;
  margin: 0;
  letter-spacing: -.03em;
  opacity: 0;
  animation: pm-sr-reveal 1.2s cubic-bezier(.4,0,.2,1) .3s forwards;
}

.text {
  font-family: var(--font-family);
  font-weight: 400;
  font-size: 22px;
  color: rgba(255,255,255,.92);
  margin: 30px 0 0;
  line-height: 1.6;
  opacity: 0;
  animation: pm-sr-reveal 1.2s cubic-bezier(.4,0,.2,1) .5s forwards;
}

.scroll-indicator {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  color: rgba(255,255,255,.85);
  font-family: var(--font-family);
  font-size: 13px;
  letter-spacing: .25em;
}

.scroll-indicator .line {
  width: 1px;
  height: 50px;
  background: rgba(255,255,255,.5);
  animation: pm-scroll-line 2s ease-in-out infinite;
}
</style>
</head>
<body>
<section class="sec main-visual">
  <div class="bg">
    <video src="https://www.plantym.com/upload/visual/20260224_104516_2783.mp4" autoplay muted loop playsinline></video>
  </div>
  <div class="inner large">
    <h1 class="heading">Planting the Value</h1>
    <p class="text">세상에 필요한 가치를 심어 모두의 내일을 이롭게 가꾸어 갑니다.</p>
  </div>
  <div class="scroll-indicator">
    <span>SCROLL</span>
    <span class="line"></span>
  </div>
</section>
</body>
</html>
