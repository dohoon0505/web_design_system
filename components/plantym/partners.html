<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PlantyM — Partners (실측 1,035px 13+ 로고 격자 + BUILDING A GLOBAL SERVICE)</title>
<link rel="stylesheet" href="../../plantym-app/styles/globals.css">
<style>
.main-partners {
  position: relative;
  width: 100%;
  height: 1035px;
  background: #fff;
  padding: 100px 0 0;
  overflow: hidden;
}

.main-partners .inner {
  max-width: var(--container-inner);
  margin: 0 auto;
  padding: 0 30px;
}

.partners-tag {
  font-family: var(--font-family);
  font-size: 16px;
  font-weight: 600;
  color: var(--accent-color);
  letter-spacing: .2em;
  margin: 0 0 24px;
}

.partners-heading {
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--fs-section-h3);
  color: var(--primary-color);
  margin: 0 0 70px;
  letter-spacing: -.02em;
  line-height: 1.25;
}

.partners-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
  border: 1px solid #ebebeb;
  border-radius: 0;
  margin-bottom: 100px;
}

.partners-grid-item {
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid #ebebeb;
  border-bottom: 1px solid #ebebeb;
  background: #fff;
  transition: background .3s;
}

.partners-grid-item:nth-child(6n) { border-right: 0; }
.partners-grid-item:nth-last-child(-n+6) { border-bottom: 0; }

.partners-grid-item:hover { background: #fafafa; }

.partners-grid-item img {
  max-width: 70%;
  max-height: 50px;
  width: auto;
  height: auto;
  object-fit: contain;
  filter: grayscale(.4);
  opacity: .85;
  transition: filter .3s, opacity .3s;
}

.partners-grid-item:hover img {
  filter: grayscale(0);
  opacity: 1;
}

.global-service-text {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0 30px 60px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.global-service-text h2 {
  font-family: var(--font-family);
  font-weight: 800;
  font-size: 120px;
  color: var(--primary-color);
  margin: 0;
  letter-spacing: -.04em;
  line-height: .95;
  white-space: nowrap;
}

.btn-top-fab {
  position: fixed;
  bottom: 40px;
  right: 40px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent-color);
  border: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(252,109,37,.3);
}

.btn-top-fab::before {
  content: '';
  width: 10px;
  height: 10px;
  border-top: 1.5px solid #fff;
  border-right: 1.5px solid #fff;
  transform: rotate(-45deg) translate(2px, -2px);
}
</style>
</head>
<body>
<section class="sec main-partners">
  <div class="inner">
    <p class="partners-tag font-outfit">PARTNERS</p>
    <h3 class="partners-heading">함께 나아가는 고객사들</h3>

    <div class="partners-grid">
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-1.png" alt="LG U+"></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-2.png" alt="SK telecom"></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-3.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-4.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-5.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-6.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-1.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-2.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-3.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-4.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-5.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-6.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-7.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-1.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-3.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo1-5.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-2.png" alt=""></div>
      <div class="partners-grid-item"><img src="https://www.plantym.com/images/partners-logo2-4.png" alt=""></div>
    </div>
  </div>

  <div class="global-service-text">
    <h2>BUILDING A<br>GLOBAL SERVICE</h2>
    <button class="btn-top-fab" aria-label="맨 위로"></button>
  </div>
</section>
</body>
</html>
