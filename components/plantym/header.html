<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PlantyM — Header (실측 100px Fixed)</title>
<link rel="stylesheet" href="../../plantym-app/styles/globals.css">
<style>
.pm-stage { min-height: 700px; background: #000; position: relative; overflow: hidden; }
.pm-stage::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(252,109,37,.4), rgba(252,109,37,.05) 40%, transparent 70%);
}
.pm-stage::after {
  content: 'Planting the Value'; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-family); font-weight: 700; font-size: 80px;
  color: rgba(255,255,255,.92); letter-spacing: -.03em;
}

#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-height); z-index: 9999;
  background: transparent;
}
#headerInner { display: flex; align-items: center; height: 100%; padding: 0 50px; }

/* Logo */
h1.logo-h { margin: 0; }
.logo {
  display: inline-flex; align-items: center;
  font-family: var(--font-family); font-weight: 800; font-size: 24px;
  color: #fff; letter-spacing: -.02em;
}

/* GNB */
.gnb { display: flex; flex: 1; justify-content: center; height: 100%; }
.nav { height: 100%; }
.depth1 {
  display: flex; gap: 60px; height: 100%; align-items: center;
  list-style: none; margin: 0; padding: 0;
  font-family: var(--font-family);
}
.depth1 > li { position: relative; height: 100%; display: flex; align-items: center; }
.depth1 > li > a {
  color: #fff; font-size: 18px; font-weight: 500;
  letter-spacing: -.01em; transition: color .3s;
  padding: 4px 0;
}
.depth1 > li:hover > a { color: var(--accent-color); }
.depth2 {
  position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  min-width: 180px; padding: 12px 0;
  background: rgba(0,0,0,.9); border-radius: 8px;
  display: none; list-style: none; margin: 0;
  font-family: var(--font-family);
}
.depth1 > li:hover .depth2 { display: block; }
.depth2 li a {
  display: block; padding: 10px 18px;
  color: rgba(255,255,255,.85); font-size: 14px; white-space: nowrap;
  transition: color .3s;
}
.depth2 li a:hover { color: var(--accent-color); }

/* Hamburger */
.close {
  width: 40px; height: 40px;
  display: flex; flex-direction: column; justify-content: center; gap: 6px;
  align-items: flex-end;
  cursor: pointer;
}
.close .line {
  display: block; width: 26px; height: 2px;
  background: #fff;
}
.close .line:nth-child(2) { width: 18px; }
.close .line:nth-child(3) { width: 22px; }
</style>
</head>
<body>
<div class="pm-stage">
  <header id="header">
    <div id="headerInner">
      <h1 class="logo-h">
        <a href="/" class="logo"><span>PlantyM</span></a>
      </h1>
      <div class="gnb">
        <nav class="nav">
          <ul class="depth1">
            <li>
              <a href="#">회사소개</a>
              <ul class="depth2">
                <li><a href="#">기업정보</a></li>
                <li><a href="#">연혁</a></li>
                <li><a href="#">CI</a></li>
                <li><a href="#">고객센터</a></li>
              </ul>
            </li>
            <li>
              <a href="#">사업정보</a>
              <ul class="depth2">
                <li><a href="#">디지털 매거진 플랫폼</a></li>
                <li><a href="#">매장음악 서비스</a></li>
                <li><a href="#">디지털 사이니지</a></li>
              </ul>
            </li>
            <li>
              <a href="#">PR</a>
              <ul class="depth2">
                <li><a href="#">공지사항</a></li>
                <li><a href="#">보도자료</a></li>
              </ul>
            </li>
            <li><a href="#">Careers</a></li>
          </ul>
        </nav>
      </div>
      <div class="close">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </div>
    </div>
  </header>
</div>
</body>
</html>
