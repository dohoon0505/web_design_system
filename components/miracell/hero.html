<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Miracell — Hero (실측 1080px 5-Column Roller)</title>
<link rel="stylesheet" href="../../miracell-app/styles/globals.css">
<style>
/* Hero #mainVisual — 라이브 실측 1080px × 5컬럼 × 2 roller */
#mainVisual {
  position: relative;
  width: 100%;
  height: 1080px;
  background: #000;
  overflow: hidden;
}

/* Gray Layer (그레이스케일 5 컬럼) */
.gray-layer {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  padding: 4px;
}

.visual-img-list-container {
  overflow: hidden;
  position: relative;
}

.visual-img-list-wrap {
  height: 100%;
  position: relative;
  overflow: hidden;
}

.visual-img-roller {
  position: absolute;
  left: 0; right: 0;
}

.visual-img-roller ul {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.visual-img-roller.up ul {
  animation: hero-roll-up 28s linear infinite;
}

.visual-img-roller.down ul {
  animation: hero-roll-down 28s linear infinite;
}

.visual-img-roller li {
  height: 540px; /* 1080 / 2 */
  overflow: hidden;
  border-radius: 2px;
}

.visual-img-roller img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(.85) brightness(.5) contrast(1.1);
}

/* 컬럼별 다른 듀레이션 (라이브 패턴) */
.visual-img-list-01 .visual-img-roller ul { animation-duration: 26s; }
.visual-img-list-02 .visual-img-roller ul { animation-duration: 32s; }
.visual-img-list-03 .visual-img-roller ul { animation-duration: 24s; }
.visual-img-list-04 .visual-img-roller ul { animation-duration: 30s; }
.visual-img-list-05 .visual-img-roller ul { animation-duration: 28s; }

@keyframes hero-roll-up {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

@keyframes hero-roll-down {
  from { transform: translateY(-50%); }
  to { transform: translateY(0); }
}

/* Overlay */
.hero-overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,.45) 0%, rgba(0,0,0,.75) 100%);
  z-index: 1;
}

/* Hero Text (실측 h2 150px Outfit 600 #dd0031 + p 30px white) */
.hero-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2;
  text-align: center;
  pointer-events: none;
}

.main-visual-txt1 {
  font-family: var(--font-family2);
  font-weight: 600;
  font-size: 150px;
  line-height: 1;
  letter-spacing: -.03em;
  color: var(--main-color);
  margin: 0;
  opacity: 0;
  animation: mr-text-active 1.5s cubic-bezier(.4,0,.2,1) .3s forwards;
}

.main-visual-txt2 {
  font-family: var(--font-family2);
  font-weight: 500;
  font-size: 30px;
  color: #fff;
  margin: 30px 0 0;
  letter-spacing: .02em;
  opacity: 0;
  animation: mr-text-active 1.5s cubic-bezier(.4,0,.2,1) .8s forwards;
}

/* Scroll Down 인디케이터 (좌하단) */
.main-scroll-icon {
  position: absolute;
  bottom: 36px;
  left: 60px;
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-family2);
  font-size: 13px;
  letter-spacing: .06em;
  color: rgba(255,255,255,.85);
}

.scroll-dots {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.scroll-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #fff;
  opacity: .3;
  animation: mr-dotfade 1.5s ease infinite;
}

.scroll-dot.dot2 { animation-delay: .3s; }
.scroll-dot.dot3 { animation-delay: .6s; }

/* Pencil FAB (우하단) */
.cm-quick-menu {
  position: absolute;
  right: 60px;
  bottom: 36px;
  z-index: 3;
}

.cm-contact-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--main-color);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(221,0,49,.3);
}

.cm-contact-btn svg { color: #fff; }
</style>
</head>
<body>
<section id="mainVisual" class="full-height visual-active">
  <div class="gray-layer">
    <!-- Column 1 (up) -->
    <div class="visual-img-list-container visual-img-list-01">
      <div class="visual-img-list-wrap up">
        <div class="visual-img-roller up" style="top:0">
          <ul>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img01.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img02.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img01.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img02.jpg" alt=""></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- Column 2 (down) -->
    <div class="visual-img-list-container visual-img-list-02">
      <div class="visual-img-list-wrap down">
        <div class="visual-img-roller down" style="top:0">
          <ul>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img03.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img04.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img03.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img04.jpg" alt=""></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- Column 3 (up) -->
    <div class="visual-img-list-container visual-img-list-03">
      <div class="visual-img-list-wrap up">
        <div class="visual-img-roller up" style="top:0">
          <ul>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img05.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img06.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img05.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img06.jpg" alt=""></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- Column 4 (down) -->
    <div class="visual-img-list-container visual-img-list-04">
      <div class="visual-img-list-wrap down">
        <div class="visual-img-roller down" style="top:0">
          <ul>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img07.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img08.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img07.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img08.jpg" alt=""></li>
          </ul>
        </div>
      </div>
    </div>
    <!-- Column 5 (up) -->
    <div class="visual-img-list-container visual-img-list-05">
      <div class="visual-img-list-wrap up">
        <div class="visual-img-roller up" style="top:0">
          <ul>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img09.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img01.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img09.jpg" alt=""></li>
            <li><img src="https://miracell.co.kr/images/main/main_visual_img01.jpg" alt=""></li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <div class="hero-overlay"></div>

  <div class="hero-text">
    <h2 class="main-visual-txt1">Miracell</h2>
    <p class="main-visual-txt2">Standard of Stem Cell</p>
  </div>

  <div class="main-scroll-icon font-outfit">
    <div class="scroll-dots">
      <span class="scroll-dot dot1"></span>
      <span class="scroll-dot dot2"></span>
      <span class="scroll-dot dot3"></span>
    </div>
    <span>Scroll down</span>
  </div>

  <div class="cm-quick-menu">
    <a href="#" class="cm-contact-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 19l7-7 3 3-7 7-3-3z"/>
        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
        <path d="M2 2l7.586 7.586"/>
        <circle cx="11" cy="11" r="2"/>
      </svg>
    </a>
  </div>
</section>
</body>
</html>
