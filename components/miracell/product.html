<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Miracell — Product (실측 1122px · 5 카드 408×521 · 외부 하단 라벨)</title>
<link rel="stylesheet" href="../../miracell-app/styles/globals.css">
<style>
/* Product 섹션 — 라이브 실측 1122px (padding 250 0 0) */
#mainProduct {
  position: relative;
  width: 100%;
  height: 1122px;
  padding: 250px 0 0;
  background: #fff;
  overflow: hidden;
}

.main-product-head {
  max-width: var(--area-width);
  margin: 0 auto 80px;
  padding: 0 var(--area-padding);
}

.main-product-head .main-tag {
  margin-bottom: 22px;
}

.main-product-head .main-tit {
  font-family: var(--font-family1);
  font-weight: 800;
  font-size: 65px;
  line-height: 1.3;
  color: #000;
  letter-spacing: -.02em;
  margin: 0;
}

.main-product-head .main-tit .red { color: var(--main-color); }

/* Product Slider — 5 카드 무한 스크롤 */
.main-product-track {
  overflow: hidden;
  padding: 30px 0 60px;
}

.main-product-list {
  display: flex;
  gap: 24px;
  padding: 0 60px;
  animation: prd-scroll 35s linear infinite;
  width: max-content;
}

@keyframes prd-scroll {
  from { transform: translateX(0); }
  to { transform: translateX(calc(-50% - 12px)); }
}

.main-prd-item {
  flex: 0 0 auto;
  width: 408px;
  display: flex;
  flex-direction: column;
}

.main-prd-item a {
  display: flex;
  flex-direction: column;
}

/* 라이브 패턴: 카드 박스 = 이미지만 (회색 배경) */
.main-prd-item .img-wrap {
  width: 408px;
  height: 480px;
  background: #f5f5f5;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  transition: transform .4s ease-in-out, box-shadow .4s ease-in-out;
  box-shadow: 0 4px 16px rgba(0,0,0,.04);
}

.main-prd-item:hover .img-wrap {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(0,0,0,.08);
}

.main-prd-item img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* 라이브 패턴: 라벨은 카드 박스 외부 하단 */
.main-prd-item .prd-name {
  display: block;
  margin-top: 30px;
  font-family: var(--font-family2);
  font-weight: 600;
  font-size: 24px;
  letter-spacing: -.01em;
  text-align: center;
  color: #000;
}
</style>
</head>
<body>
<article id="mainProduct">
  <div class="main-product-head">
    <span class="main-tag font-outfit">Product <i class="dot"></i></span>
    <h4 class="main-tit">생명과 건강을 위한<br><span class="red">끊임없는 노력의 결과입니다.</span></h4>
  </div>

  <div class="main-product-track">
    <ul class="main-product-list">
      <li class="main-prd-item">
        <a href="#">
          <div class="img-wrap"><img src="https://miracell.co.kr/images/main/main_prd_img01.png" alt=""></div>

        </a>
      </li>

      </li>
      <li class="main-prd-item">

      </li>

        </a>

</html>
