<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KT&G .global - 별 우주 + 지구 + 5장 카드 sticky-sequence</title>
<link rel="stylesheet" href="_shared/tokens.css">
<style>
  body { background: #fff; }
  .global {
    position: relative;
    height: 500vh;
    background: #fff;
  }
  .global__stars {
    position: absolute; inset: 0;
    background: #000 url('https://www.ktng.com/webgl/2k_stars_milky_way.webp') center/cover no-repeat;
    opacity: 0.85;
    z-index: 0;
  }
  .global__content {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
  }
  .global__heading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
    background: #fff;
    padding: 80px 89px;
    width: 100%;
    box-sizing: border-box;
    will-change: opacity;
  }
  .global__label {
    font-size: 18px;
    font-weight: 500;
    color: #000;
    margin-bottom: 24px;
    letter-spacing: 0.02em;
  }
  .global__title {
    font-size: 72px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.15;
    margin: 0;
    color: #000;
  }
  .global__earth {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.05);
    width: 720px;
    height: 720px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, #5a8cd8 0%, #2868c8 25%, #1a4a90 50%, #0a2a60 75%, #000020 100%);
    box-shadow:
      inset -60px -60px 140px rgba(0,0,0,0.7),
      0 0 100px rgba(80,140,220,0.35);
    overflow: hidden;
    z-index: 2;
    will-change: transform;
  }
  .global__earth::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 28% 18% at 30% 30%, rgba(255,255,255,0.55), transparent 60%),
      radial-gradient(ellipse 22% 14% at 70% 50%, rgba(220,240,255,0.45), transparent 60%),
      radial-gradient(ellipse 18% 10% at 50% 75%, rgba(200,220,255,0.4), transparent 60%),
      radial-gradient(ellipse 15% 8% at 75% 25%, rgba(255,255,255,0.35), transparent 60%);
    animation: earth-clouds 100s linear infinite;
  }
  .global__earth::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 18% 22% at 55% 40%, rgba(50,130,70,0.55), transparent 60%),
      radial-gradient(ellipse 12% 16% at 30% 60%, rgba(140,100,55,0.5), transparent 60%),
      radial-gradient(ellipse 10% 14% at 70% 70%, rgba(60,150,80,0.45), transparent 60%);
  }
  @keyframes earth-clouds { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  .global__overlay {
    position: absolute;
    top: 18%; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #fff;
    z-index: 4;
    text-shadow: 0 2px 14px rgba(0,0,0,0.6);
    opacity: 0;
    will-change: opacity;
  }
  .global__overlay-label {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }
  .global__cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-size: 16px;
    color: #fff;
    background: transparent;
    border: none;
    cursor: pointer;
  }
  .global__cta-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #fff;
    color: #000;
    display: flex; align-items: center; justify-content: center;
    transition: var(--tx-all);
  }
  .global__cta:hover .global__cta-icon { transform: translateX(4px) rotate(-12deg); }

  .global__cards-wrap {
    position: absolute;
    top: 50%; left: 0; right: 0;
    transform: translateY(-50%);
    overflow: visible;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    will-change: opacity;
  }
  .global__cards {
    display: flex;
    gap: 24px;
    padding: 0 89px;
    will-change: transform;
    pointer-events: auto;
  }
  .global__card {
    flex: 0 0 360px;
    height: 420px;
    background: linear-gradient(135deg, rgba(155,170,245,0.92) 0%, rgba(110,130,220,0.92) 50%, rgba(80,100,200,0.92) 100%);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px;
    padding: 48px 36px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex; flex-direction: column;
    justify-content: space-between;
    color: #fff;
    box-shadow: 0 16px 48px rgba(20,40,100,0.4);
  }
  .global__num-row { display: flex; align-items: baseline; gap: 10px; }
  .global__num {
    font-size: 96px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.025em;
    font-feature-settings: 'tnum';
    color: #fff;
  }
  .global__unit {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
  }
  .global__card-label {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
  }
  .global__card-note {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
  }
  @media (max-width: 1024px) {
    .global__title { font-size: 48px; }
    .global__earth { width: 480px; height: 480px; }
    .global__card { flex: 0 0 280px; height: 340px; padding: 32px 24px; }
    .global__num { font-size: 64px; }
  }
</style>
</head>
<body>
<section class="global">
  <div class="global__stars"></div>
  <div class="global__content">
    <div class="global__heading" data-heading>
      <div class="global__label">Global Business Highlights</div>
      <h2 class="global__title">우리는 글로벌 리더 KT&G입니다</h2>
    </div>
    <div class="global__earth" data-earth></div>
    <div class="global__overlay" data-overlay>
      <div class="global__overlay-label">Global Business Highlights</div>
      <button class="global__cta">
        네트워크 바로가기 <span class="global__cta-icon">→</span>
      </button>
    </div>
    <div class="global__cards-wrap" data-cards-wrap>
      <div class="global__cards" data-cards>
        <div class="global__card">
          <div class="global__num-row">
            <span class="global__num" data-target="17">0</span>
            <span class="global__unit">locations</span>
          </div>
          <div class="global__card-label">해외 법인 및<br>지사 수</div>
          <div class="global__card-note">*25년 기준</div>
        </div>
        <div class="global__card">
          <div class="global__num-row">
            <span class="global__num" data-target="140">0</span>
            <span class="global__unit">countries</span>
          </div>
          <div class="global__card-label">해외궐련 사업<br>운영 국가 수</div>
          <div class="global__card-note">*25년 기준</div>
        </div>
        <div class="global__card">
          <div class="global__num-row">
            <span class="global__num" data-target="65.2" data-decimal="1">0</span>
            <span class="global__unit">billion<br>sticks</span>
          </div>
          <div class="global__card-label">해외궐련<br>판매수량</div>
          <div class="global__card-note">*25년 기준</div>
        </div>
        <div class="global__card">
          <div class="global__num-row">
            <span class="global__num" data-target="1.478" data-decimal="3">0</span>
            <span class="global__unit">billion<br>sticks</span>
          </div>
          <div class="global__card-label">스틱 판매수량</div>
          <div class="global__card-note">*25년 기준</div>
        </div>
        <div class="global__card">
          <div class="global__num-row">
            <span class="global__num" data-target="34">0</span>
            <span class="global__unit">countries</span>
          </div>
          <div class="global__card-label">NGP 사업진출<br>국가 수</div>
          <div class="global__card-note">*25년 기준</div>
        </div>
      </div>
    </div>
  </div>
</section>
<script>
(function(){
  const section = document.querySelector('.global');
  const heading = document.querySelector('[data-heading]');
  const earth = document.querySelector('[data-earth]');
  const overlay = document.querySelector('[data-overlay]');
  const wrap = document.querySelector('[data-cards-wrap]');
  const cards = document.querySelector('[data-cards]');
  const nums = document.querySelectorAll('.global__num[data-target]');
  if (!section || !cards) return;

  const fmt = (v, d) => d > 0 ? v.toLocaleString('en-US', {minimumFractionDigits: d, maximumFractionDigits: d}) : Math.round(v).toLocaleString('en-US');

  const update = () => {
    const rect = section.getBoundingClientRect();
    const sectionH = section.offsetHeight;
    const vH = window.innerHeight;
    const scrolled = Math.max(0, -rect.top);
    const maxScroll = sectionH - vH;
    if (maxScroll <= 0) return;

    const p1 = Math.max(0, Math.min(1, (scrolled - 100) / 400));  // heading fade out
    const p2 = Math.max(0, Math.min(1, (scrolled - 100) / 700));  // earth zoom in
    const p3 = Math.max(0, Math.min(1, (scrolled - 900) / (maxScroll - 900)));  // cards slide in

    if (heading) heading.style.opacity = 1 - p1;
    if (earth) {
      const s = 0.05 + 0.95 * p2;
      earth.style.transform = `translate(-50%,-50%) scale(${s})`;
    }
    if (overlay) overlay.style.opacity = p2 > 0.5 ? Math.min(1, (p2 - 0.5) * 3) : 0;
    if (wrap) wrap.style.opacity = p3 > 0 ? 1 : 0;
    if (cards) {
      const totalW = cards.scrollWidth;
      const maxX = Math.max(0, totalW - window.innerWidth + 178);
      cards.style.transform = `translateX(${window.innerWidth * 0.55 - p3 * maxX}px)`;
    }
  };
  window.addEventListener('scroll', update, {passive: true});
  window.addEventListener('resize', update, {passive: true});
  update();

  const animate = (el, target, decimal) => {
    const start = performance.now();
    const dur = 1800;
    const tick = (now) => {
      const t = Math.min((now - start) / dur, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      el.textContent = fmt(target * eased, decimal);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = fmt(target, decimal);
    };
    requestAnimationFrame(tick);
  };
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting && !e.target.dataset.animated) {
        e.target.dataset.animated = '1';
        animate(e.target, parseFloat(e.target.dataset.target), parseInt(e.target.dataset.decimal || '0', 10));
      }
    });
  }, {threshold: 0.4});
  nums.forEach(n => obs.observe(n));
})();
</script>
</body>
</html>
